<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Drummer - Organic Metal Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --pad-bg: #2a2a2a;
            --accent: #e53935;
            --text-color: #888;
            --step-bg: #333;
            --step-active: #e53935;
            --step-current: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
        }

        h1 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .version {
            font-size: 12px;
            color: #666;
            font-weight: normal;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            align-items: center;
        }

        button.main-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
            text-transform: uppercase;
        }

        button.main-btn:active { background-color: #444; }

        .bpm-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .bpm-label {
            font-size: 12px;
            letter-spacing: 1px;
            color: #aaa;
        }

        .bpm-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .small-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 8px;
            width: 35px;
            height: 35px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .small-btn:active { background-color: #444; }

        input[type="number"] {
            width: 55px;
            height: 31px;
            text-align: center;
            background: #2a2a2a;
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            outline: none;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tilt-wrapper {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #aaa;
        }

        .tilt-wrapper input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
        }

        .xy-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .label {
            position: absolute;
            font-size: 12px;
            letter-spacing: 1px;
            pointer-events: none;
            color: #999;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
        .label.top { top: -20px; left: 50%; transform: translateX(-50%); color: var(--accent); }
        .label.bottom { bottom: -20px; left: 50%; transform: translateX(-50%); }
        .label.left { left: -50px; top: 50%; transform: translateY(-50%) rotate(-90deg); width: 60px; }
        .label.right { right: -60px; top: 50%; transform: translateY(-50%) rotate(90deg); width: 80px; }

        .xy-pad {
            width: 100%;
            height: 100%;
            background-color: var(--pad-bg);
            border: 2px solid #333;
            border-radius: 20px;
            position: relative;
            touch-action: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .xy-pad::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 10% 10%; 
            pointer-events: none;
        }

        .puck {
            width: 26px;
            height: 26px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent);
            pointer-events: none;
            z-index: 2;
        }

        .sequencer {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .row-label {
            width: 40px;
            font-size: 12px;
            color: #aaa;
            text-align: right;
            padding-right: 10px;
            font-weight: bold;
        }

        .steps {
            display: flex;
            flex: 1;
            justify-content: space-between;
        }

        .step {
            width: 15px;
            height: 25px;
            background-color: var(--step-bg);
            border-radius: 3px;
            transition: background-color 0.1s, opacity 0.1s;
        }

        .step.active {
            background-color: var(--step-active);
        }

        .step.playing {
            background-color: var(--step-current) !important;
            box-shadow: 0 0 10px #fff;
        }

        .download-btn {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>Groove Generator <span class="version">v1.8 Gyro+</span></h1>

    <div class="controls">
        <button id="playBtn" class="main-btn">PLAY</button>
        <div class="bpm-container">
            <div class="bpm-label">TEMPO (BPM)</div>
            <div class="bpm-controls">
                <button id="bpmMinus" class="small-btn">-</button>
                <input type="number" id="bpmInput" value="140" min="40" max="300">
                <button id="bpmPlus" class="small-btn">+</button>
            </div>
        </div>
    </div>

    <div class="tilt-wrapper">
        <input type="checkbox" id="tiltToggle">
        <label for="tiltToggle">Enable Tilt Control (Flat = Center)</label>
    </div>

    <div class="xy-wrapper">
        <span class="label top">Hate</span>
        <span class="label bottom">Calm</span>
        <span class="label left">Doom</span>
        <span class="label right">Blast</span>
        <div class="xy-pad" id="xyPad">
            <div class="puck" id="puck"></div>
        </div>
    </div>

    <div class="sequencer" id="sequencer">
    </div>

    <button id="downloadMidiBtn" class="download-btn">DOWNLOAD MIDI</button>

    <script>
        let isPlaying = false;
        let bpm = 140;
        let complexity = 0.5;
        let loudness = 0.5;
        let tiltEnabled = false;
        
        let currentStep = 0;
        let nextNoteTime = 0;
        let lookahead = 25; 
        let scheduleAheadTime = 0.1; 
        let timerID;

        const instruments = ['Cymbal', 'Snare', 'Kick'];
        let groove = {
            'Cymbal': new Array(16).fill(0),
            'Snare': new Array(16).fill(0),
            'Kick': new Array(16).fill(0)
        };

        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function getCymbalType() {
            if (loudness < 0.35) return 'ClosedHH';
            if (loudness < 0.70) return 'OpenHH';
            return 'Crash'; 
        }

        function playSound(inst, velocity, time) {
            if (!audioCtx) return;
            
            let gainMultiplier = 0.4 + (loudness * 0.6); 
            const vol = (velocity / 127) * gainMultiplier;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(vol, time);
            gainNode.connect(audioCtx.destination);

            if (inst === 'Kick') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gainNode);
                osc.start(time);
                osc.stop(time + 0.2);
                
            } else if (inst === 'Snare') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, time);
                
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                noise.connect(noiseFilter);
                noiseFilter.connect(gainNode);
                
                osc.connect(gainNode);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                
                osc.start(time);
                noise.start(time);
                osc.stop(time + 0.25);
                
            } else if (inst === 'Cymbal') {
                let type = getCymbalType();
                const noise = audioCtx.createBufferSource();
                
                if (type === 'Crash') {
                    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                    noise.buffer = buffer;

                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 4000; 
                    
                    noise.connect(filter);
                    filter.connect(gainNode);
                    
                    gainNode.gain.setValueAtTime(vol * 1.2, time); 
                    gainNode.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
                    noise.start(time);
                    
                } else {
                    // HiHats
                    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                    noise.buffer = buffer;

                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = type === 'OpenHH' ? 5000 : 7000;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    
                    let decay = type === 'OpenHH' ? 0.4 : 0.08;
                    gainNode.gain.exponentialRampToValueAtTime(0.001, time + decay);
                    noise.start(time);
                }
            }
        }

        let currentSeed = 0;
        function seededRandom() {
            let x = Math.sin(currentSeed++) * 10000;
            return x - Math.floor(x);
        }

        function generateGroove() {
            for(let inst in groove) groove[inst].fill(0);

            let baseVel = Math.floor(70 + (loudness * 57));
            let ghostVel = Math.floor(baseVel * 0.5);

            let zoneX = Math.floor(complexity * 20);
            let zoneY = Math.floor(loudness * 20);
            currentSeed = zoneX + (zoneY * 100); 

            let blastFactor = Math.max(0, (complexity - 0.75) / 0.25);
            // Hate factor: Y tengely felső részénél megnöveli a 16-od lábdobok esélyét (Duplázó)
            let hateFactor = Math.max(0, (loudness - 0.6) * 2.5); 

            for(let i = 0; i < 16; i++) {
                
                // --- KICK ---
                let kVel = 0;
                if (i === 0) kVel = baseVel;
                else if (i === 8 && complexity >= 0.15) kVel = baseVel; 
                else {
                    let prob = complexity * 0.8;
                    if (i % 2 !== 0) prob *= 0.4; 
                    if (seededRandom() < prob) kVel = (i % 2 !== 0) ? ghostVel : baseVel;
                }

                // Hate = Double Bass bekapcsolása (16-odok kitöltése)
                if (hateFactor > 0 && i % 2 !== 0) {
                    if (seededRandom() < hateFactor) {
                        kVel = baseVel * 0.8; // Feszes 16-od rúgások
                    }
                }

                if (blastFactor > 0) {
                    if (i % 2 === 0) {
                        if (seededRandom() < blastFactor) kVel = baseVel;
                    } else {
                        if (seededRandom() < blastFactor) kVel = 0;
                    }
                }
                groove['Kick'][i] = kVel;

                // --- SNARE ---
                let sVel = 0;
                
                if (complexity < 0.15) {
                    if (i === 8) sVel = baseVel; // DOOM: Csak egy csapás a közepén
                } else if (i === 4 || i === 12) {
                    sVel = baseVel; // ROCK: 2 és 4
                } else {
                    let prob = Math.max(0, complexity - 0.2) * 0.7;
                    if (seededRandom() < prob && kVel === 0) sVel = ghostVel;
                }

                if (blastFactor > 0) {
                    if (i % 2 !== 0) {
                        if (seededRandom() < blastFactor) sVel = baseVel;
                    } else {
                        if (i !== 4 && i !== 12 && seededRandom() < blastFactor) sVel = 0;
                    }
                    
                    if ((i === 4 || i === 12) && blastFactor > 0.5) {
                        if (seededRandom() < (blastFactor - 0.5) * 2) {
                            sVel = 0;
                            groove['Kick'][i] = baseVel;
                        }
                    }
                }
                groove['Snare'][i] = sVel;

                // --- CYMBAL ---
                let cType = getCymbalType();
                let cVel = 0;
                
                if (cType === 'Crash') {
                    // Crash: Ritkított ütés, "tá - tá", főleg negyedeken (0, 4, 8, 12)
                    if (i % 4 === 0) {
                        // Nem mindig minden negyeden üt, picit függ az Y pozíciótól
                        if (seededRandom() < (loudness + 0.2)) cVel = baseVel;
                    }
                } else {
                    // Hi-Hat: Jöhetnek a sűrűbb 16-odok (tiri)
                    if (i % 2 === 0) {
                        cVel = baseVel; // Biztos 8-adok (ti)
                    } else {
                        // 16-odok (ri) esélye megnő ahogy jobbra húzod
                        if (complexity > 0.2 && seededRandom() < (complexity + 0.2)) {
                            cVel = ghostVel;
                        }
                    }
                    
                    // Doom szellősítés
                    if (complexity < 0.15 && i % 4 !== 0) cVel = 0; 
                }

                // Blastbeat alatt a cin is ritkul
                if (blastFactor > 0.6 && i % 2 !== 0) cVel = 0;
                if (blastFactor > 0.9 && i % 4 !== 0 && cType === 'Crash') cVel = 0;

                groove['Cymbal'][i] = cVel;
            }

            updateSequencerVisuals();
        }

        const seqDiv = document.getElementById('sequencer');
        
        function initSequencer() {
            seqDiv.innerHTML = '';
            instruments.forEach(inst => {
                const row = document.createElement('div');
                row.className = 'row';
                
                const label = document.createElement('div');
                label.className = 'row-label';
                label.innerText = inst === 'Cymbal' ? 'CY' : (inst === 'Snare' ? 'SN' : 'KD');
                row.appendChild(label);

                const stepsDiv = document.createElement('div');
                stepsDiv.className = 'steps';
                
                for(let i=0; i<16; i++) {
                    const step = document.createElement('div');
                    step.className = 'step';
                    step.id = `step-${inst}-${i}`;
                    stepsDiv.appendChild(step);
                }
                row.appendChild(stepsDiv);
                seqDiv.appendChild(row);
            });
        }

        function updateSequencerVisuals() {
            instruments.forEach(inst => {
                for(let i=0; i<16; i++) {
                    const step = document.getElementById(`step-${inst}-${i}`);
                    if (step) {
                        if (groove[inst][i] > 0) {
                            step.classList.add('active');
                            step.style.opacity = Math.max(0.3, groove[inst][i] / 127);
                        } else {
                            step.classList.remove('active');
                            step.style.opacity = 1;
                        }
                    }
                }
            });
        }

        function highlightStep(stepIndex) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            instruments.forEach(inst => {
                const el = document.getElementById(`step-${inst}-${stepIndex}`);
                if (el) el.classList.add('playing');
            });
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            currentStep++;
            if (currentStep === 16) {
                currentStep = 0;
            }
        }

        function scheduleNote(stepNumber, time) {
            setTimeout(() => {
                if (isPlaying) highlightStep(stepNumber);
            }, (time - audioCtx.currentTime) * 1000);

            instruments.forEach(inst => {
                const vel = groove[inst][stepNumber];
                if (vel > 0) {
                    playSound(inst, vel, time);
                }
            });
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentStep, nextNoteTime);
                nextNote();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                isPlaying = false;
                playBtn.innerText = "PLAY";
                playBtn.style.color = "var(--accent)";
                clearTimeout(timerID);
                document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            } else {
                isPlaying = true;
                playBtn.innerText = "STOP";
                playBtn.style.color = "white";
                currentStep = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
            }
        });

        const bpmInput = document.getElementById('bpmInput');
        const btnMinus = document.getElementById('bpmMinus');
        const btnPlus = document.getElementById('bpmPlus');

        function updateBpm(newVal) {
            bpm = Math.max(40, Math.min(300, newVal));
            bpmInput.value = bpm;
        }

        bpmInput.addEventListener('change', (e) => updateBpm(e.target.value));
        btnMinus.addEventListener('click', () => updateBpm(bpm - 5));
        btnPlus.addEventListener('click', () => updateBpm(bpm + 5));

        const xyPad = document.getElementById('xyPad');
        const puck = document.getElementById('puck');

        function updateXY(x, y) {
            const rect = xyPad.getBoundingClientRect();
            let px = Math.max(0, Math.min(x, rect.width));
            let py = Math.max(0, Math.min(y, rect.height));

            puck.style.left = `${px}px`;
            puck.style.top = `${py}px`;

            complexity = px / rect.width;
            loudness = 1.0 - (py / rect.height);
            
            generateGroove();
        }

        function handlePadMove(e) {
            if (tiltEnabled) return; 
            const rect = xyPad.getBoundingClientRect();
            if (e.touches) {
                e.preventDefault();
                updateXY(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            } else {
                if (e.buttons === 1) {
                    updateXY(e.clientX - rect.left, e.clientY - rect.top);
                }
            }
        }

        xyPad.addEventListener('mousedown', (e) => {
            if(!tiltEnabled) {
                const rect = xyPad.getBoundingClientRect();
                updateXY(e.clientX - rect.left, e.clientY - rect.top);
            }
        });
        xyPad.addEventListener('mousemove', handlePadMove);
        xyPad.addEventListener('touchstart', (e) => { 
            if(!tiltEnabled) {
                e.preventDefault(); 
                const rect = xyPad.getBoundingClientRect();
                updateXY(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); 
            }
        }, {passive: false});
        xyPad.addEventListener('touchmove', handlePadMove, {passive: false});

        const tiltToggle = document.getElementById('tiltToggle');

        tiltToggle.addEventListener('change', async (e) => {
            if (e.target.checked) {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            tiltEnabled = true;
                        } else {
                            alert('Gyroscopic control permission denied.');
                            e.target.checked = false;
                        }
                    } catch (error) {
                        console.error(error);
                        tiltEnabled = true; 
                    }
                } else {
                    tiltEnabled = true;
                }
            } else {
                tiltEnabled = false;
            }
        });

        window.addEventListener('deviceorientation', (e) => {
            if (!tiltEnabled) return;

            // Vízszintes asztal = 0, 0
            let gamma = e.gamma || 0; // Balra/Jobbra (-90 től +90 ig)
            let beta = e.beta || 0;   // Előre/Hátra dőlés (-180 tól +180 ig)

            // -45 és +45 fok közötti dőlést mappelünk az XY pad 0.0 - 1.0 tartományára
            let xMapped = 0.5 + (gamma / 90);
            
            // Ha előre döntöd a telefont (teteje lefelé süllyed), a beta pozitív lesz.
            // Ahhoz, hogy ilyenkor a golyó "felguruljon" a Hate felé (Y = 0 irány), ki kell vonni.
            let yMapped = 0.5 - (beta / 90);

            // Túlcsordulásgátlás
            xMapped = Math.max(0, Math.min(1, xMapped));
            yMapped = Math.max(0, Math.min(1, yMapped));

            const rect = xyPad.getBoundingClientRect();
            updateXY(xMapped * rect.width, yMapped * rect.height);
        });

        function toVLQ(n) {
            let buffer = [n & 0x7F];
            while ((n >>= 7)) { buffer.unshift((n & 0x7F) | 0x80); }
            return buffer;
        }

        document.getElementById('downloadMidiBtn').addEventListener('click', () => {
            const TICKS_PER_BEAT = 120;
            const TICKS_PER_16TH = TICKS_PER_BEAT / 4;
            
            let trackEvents = [];
            const microsecondsPerBeat = Math.round(60000000 / bpm);
            trackEvents.push(0x00, 0xFF, 0x51, 0x03, 
                (microsecondsPerBeat >> 16) & 0xFF, 
                (microsecondsPerBeat >> 8) & 0xFF, 
                microsecondsPerBeat & 0xFF);

            let eventsList = [];
            
            let cymbalNote = 42; 
            let cType = getCymbalType();
            if (cType === 'OpenHH') cymbalNote = 46;
            if (cType === 'Crash') cymbalNote = 49; 

            const midiNotes = { 'Kick': 36, 'Snare': 38, 'Cymbal': cymbalNote };

            for (let step = 0; step < 16; step++) {
                instruments.forEach(inst => {
                    const vel = groove[inst][step];
                    if (vel > 0) {
                        eventsList.push({ step: step, type: 0x99, note: midiNotes[inst], vel: vel });
                        eventsList.push({ step: step + 0.9, type: 0x89, note: midiNotes[inst], vel: 0 });
                    }
                });
            }

            eventsList.sort((a, b) => a.step - b.step);

            let lastAbsoluteTick = 0;
            eventsList.forEach(ev => {
                let absoluteTick = Math.round(ev.step * TICKS_PER_16TH);
                let deltaTick = absoluteTick - lastAbsoluteTick;
                
                trackEvents.push(...toVLQ(deltaTick));
                trackEvents.push(ev.type, ev.note, ev.vel);

                lastAbsoluteTick = absoluteTick;
            });

            trackEvents.push(0x00, 0xFF, 0x2F, 0x00);

            const trackLen = trackEvents.length;
            const trackHeader = [
                0x4D, 0x54, 0x72, 0x6B,
                (trackLen >> 24) & 0xFF, (trackLen >> 16) & 0xFF, (trackLen >> 8) & 0xFF, trackLen & 0xFF
            ];

            const header = [
                0x4D, 0x54, 0x68, 0x64,
                0x00, 0x00, 0x00, 0x06,
                0x00, 0x00,
                0x00, 0x01,
                (TICKS_PER_BEAT >> 8) & 0xFF, TICKS_PER_BEAT & 0xFF
            ];

            const midiBytes = new Uint8Array([...header, ...trackHeader, ...trackEvents]);
            
            const blob = new Blob([midiBytes], { type: 'audio/midi' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `organic_metal_${bpm}bpm.mid`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        });

        initSequencer(); 
        generateGroove(); 
        
        setTimeout(() => {
            const rect = xyPad.getBoundingClientRect();
            updateXY(rect.width * 0.5, rect.height * 0.5);
        }, 100);

    </script>
</body>
