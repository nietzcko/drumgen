<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Drummer - Metal Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --pad-bg: #2a2a2a;
            --accent: #d32f2f; /* Metálos pirosra cserélve */
            --text-color: #aaa;
            --step-bg: #333;
            --step-active: #d32f2f;
            --step-current: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y; 
        }

        h1 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .version {
            font-size: 10px;
            color: #666;
            font-weight: normal;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            align-items: center;
        }

        button {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
        }

        button:active {
            background-color: #444;
        }

        /* ÚJ BPM KONTROLLER */
        .bpm-container {
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: var(--pad-bg);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        .bpm-container button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 20px;
            padding: 0 10px;
            margin: 0;
        }

        .bpm-container input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            width: 45px;
            text-align: center;
            font-weight: bold;
            font-family: inherit;
        }

        .bpm-container input:focus { outline: none; border-bottom: 1px solid var(--accent); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .bpm-label { font-size: 12px; color: #888; }

        /* XY Pad */
        .xy-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 30px;
        }

        .label {
            position: absolute;
            font-size: 12px;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: bold;
        }
        .label.top { top: -20px; left: 50%; transform: translateX(-50%); color: #fff;}
        .label.bottom { bottom: -20px; left: 50%; transform: translateX(-50%); }
        .label.left { left: -50px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .label.right { right: -65px; top: 50%; transform: translateY(-50%) rotate(90deg); color: #fff;}

        .xy-pad {
            width: 100%;
            height: 100%;
            background-color: var(--pad-bg);
            border: 2px solid #333;
            border-radius: 20px;
            position: relative;
            touch-action: none; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .puck {
            width: 30px;
            height: 30px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.6);
            pointer-events: none;
        }

        /* Sequencer */
        .sequencer {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .row-label {
            width: 40px;
            font-size: 12px;
            color: #aaa;
            text-align: right;
            padding-right: 10px;
            font-weight: bold;
        }

        .steps {
            display: flex;
            flex: 1;
            justify-content: space-between;
        }

        .step {
            width: 15px;
            height: 20px;
            background-color: var(--step-bg);
            border-radius: 3px;
            transition: background-color 0.1s, opacity 0.1s;
        }

        .step.active {
            background-color: var(--step-active);
        }

        .step.playing {
            background-color: var(--step-current) !important;
            box-shadow: 0 0 10px #fff;
        }

        .download-btn {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 100%;
            max-width: 400px;
        }

    </style>
</head>
<body>

    <h1>Metal Drummer <span class="version">v1.2</span></h1>

    <div class="controls">
        <button id="playBtn">Play</button>
        <div class="bpm-container">
            <button id="bpmMinus">-</button>
            <input type="number" id="bpmInput" value="160" min="40" max="300">
            <button id="bpmPlus">+</button>
            <span class="bpm-label">BPM</span>
        </div>
    </div>

    <div class="xy-wrapper">
        <span class="label top">LOUD</span>
        <span class="label bottom">SOFT</span>
        <span class="label left">ROCK</span>
        <span class="label right">BLAST</span>
        <div class="xy-pad" id="xyPad">
            <div class="puck" id="puck"></div>
        </div>
    </div>

    <div class="sequencer" id="sequencer">
        </div>

    <button id="downloadMidiBtn" class="download-btn">⬇ MIDI Export</button>

    <script>
        // --- ÁLLAPOT ÉS VÁLTOZÓK ---
        let isPlaying = false;
        let bpm = 160; // Alap tempó gyorsabb
        let complexity = 0.5;
        let loudness = 0.5;
        
        let currentStep = 0;
        let nextNoteTime = 0;
        let lookahead = 25; 
        let scheduleAheadTime = 0.1; 
        let timerID;

        // 4 SÁVOS RENDSZER
        const instruments = ['Ride', 'HiHat', 'Snare', 'Kick'];
        let groove = {
            'Ride': new Array(16).fill(0),
            'HiHat': new Array(16).fill(0),
            'Snare': new Array(16).fill(0),
            'Kick': new Array(16).fill(0)
        };

        // --- WEB AUDIO API (Metal Szintetizátorok) ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(inst, velocity, time) {
            if (!audioCtx) return;
            const gainNode = audioCtx.createGain();
            
            // Soha nem némul el teljesen! Master hangerő korrekció:
            const minVolume = 0.2; 
            const dynamicVolume = minVolume + (loudness * 0.8);
            const vol = (velocity / 127) * dynamicVolume;
            
            gainNode.gain.setValueAtTime(vol, time);
            gainNode.connect(audioCtx.destination);

            if (inst === 'Kick') {
                // "Kattogós" metál lábdob (éles tranzienssel)
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350, time); // Magasról indul a "klikk" miatt
                osc.frequency.exponentialRampToValueAtTime(50, time + 0.05); // Gyorsan esik le a testig
                osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.3);
                
                gainNode.gain.setValueAtTime(vol, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
                
                osc.connect(gainNode);
                osc.start(time);
                osc.stop(time + 0.3);
            } else if (inst === 'Snare') {
                // "Pattanós" feszes pergő
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(100, time + 0.1);
                
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1200; // Fentebb vágva a tisztább hangért
                noise.connect(noiseFilter);
                noiseFilter.connect(gainNode);
                
                osc.connect(gainNode);
                gainNode.gain.setValueAtTime(vol, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.15); // Rövidebb lecsengés
                
                osc.start(time);
                noise.start(time);
                osc.stop(time + 0.15);
            } else if (inst === 'HiHat') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = 'highpass'; // Élesebb
                bandpass.frequency.value = 7000;
                
                noise.connect(bandpass);
                bandpass.connect(gainNode);
                gainNode.gain.setValueAtTime(vol, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
                
                noise.start(time);
            } else if (inst === 'Ride') {
                // Fémes csengés csinálása négyszögjelekkel
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                osc1.type = 'square';
                osc2.type = 'square';
                osc1.frequency.value = 400; // Alaphang
                osc2.frequency.value = 612; // Disszonáns felhang a "ping" hatásért
                
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = 'bandpass';
                bandpass.frequency.value = 4500;
                
                osc1.connect(bandpass);
                osc2.connect(bandpass);
                bandpass.connect(gainNode);
                
                gainNode.gain.setValueAtTime(vol, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.6); // Hosszabb lecsengés
                
                osc1.start(time); osc2.start(time);
                osc1.stop(time + 0.6); osc2.stop(time + 0.6);
            }
        }

        // --- ALGORITMUS: METAL GROOVE GENERÁLÁS ---
        function generateGroove() {
            for(let inst in groove) groove[inst].fill(0);

            // Minimum velocity szint beállítása (sose némul el)
            let minVel = 40; 
            let baseVel = Math.floor(minVel + (loudness * (127 - minVel)));
            let ghostVel = Math.max(30, Math.floor(baseVel * 0.5));

            // Cin kiválasztása a loudness alapján
            let mainCymbal = loudness > 0.5 ? 'Ride' : 'HiHat';
            let altCymbal = loudness > 0.5 ? 'HiHat' : 'Ride';

            // --- COMPLEXITY SZINTEK (ROCK -> METAL -> BLASTBEAT) ---
            if (complexity < 0.3) {
                // ALAP ROCK / HARD ROCK
                groove['Kick'][0] = baseVel;
                groove['Kick'][8] = baseVel;
                if (complexity > 0.15) groove['Kick'][10] = baseVel;

                groove['Snare'][4] = baseVel;
                groove['Snare'][12] = baseVel;

                for(let i=0; i<16; i+=4) groove[mainCymbal][i] = baseVel;
                for(let i=2; i<16; i+=4) groove[mainCymbal][i] = ghostVel;

            } else if (complexity < 0.6) {
                // HEAVY METAL / GALLOP / LÉPEGETŐS DUPLÁZÓ
                for(let i=0; i<16; i+=4) {
                    groove['Kick'][i] = baseVel;
                    if (Math.random() < (complexity-0.3)*2) groove['Kick'][i+2] = baseVel; // Lépegetős láb
                }
                groove['Snare'][4] = baseVel;
                groove['Snare'][12] = baseVel;
                if (complexity > 0.4) groove['Snare'][7] = ghostVel;
                if (complexity > 0.5) groove['Snare'][15] = ghostVel;

                for(let i=0; i<16; i+=2) groove[mainCymbal][i] = (i % 4 === 0) ? baseVel : ghostVel;

            } else if (complexity < 0.85) {
                // FOLYAMATOS DUPLÁZÓ (16-odok a lábdobon)
                for(let i=0; i<16; i++) {
                    if (i % 2 === 0) groove['Kick'][i] = baseVel;
                    else groove['Kick'][i] = ghostVel + 10;
                }
                
                groove['Snare'][4] = baseVel;
                groove['Snare'][12] = baseVel;
                // Skank beat beindul
                if (complexity > 0.75) {
                    groove['Snare'][2] = ghostVel; groove['Snare'][6] = ghostVel;
                    groove['Snare'][10] = ghostVel; groove['Snare'][14] = ghostVel;
                }

                // Cinek gyorsulnak
                for(let i=0; i<16; i+=2) groove[mainCymbal][i] = baseVel;
                if (loudness > 0.7) groove[mainCymbal][0] = baseVel + 20; // Ride kúp hangsúlyos

            } else {
                // BLASTBEAT ZONE (>85%)
                for(let i=0; i<16; i++) {
                    groove['Kick'][i] = baseVel; // Láb pörög végig
                    groove[mainCymbal][i] = (i % 2 === 0) ? baseVel : ghostVel; // Cin is pörög

                    if (complexity > 0.95) {
                        // Hammer Blast (Láb és pergő teljesen egyszerre 16-odokon)
                        groove['Snare'][i] = baseVel;
                    } else {
                        // Traditional / Alternate Blast (Pergő a nyolcadokon)
                        if (i % 2 === 0) groove['Snare'][i] = baseVel;
                    }
                }
            }

            // Ha nagyon "Soft" van, dobjunk be pár ghost note-ot az elnyomott cinre is
            if (loudness < 0.3 && complexity > 0.4) {
                groove['Ride'][4] = ghostVel - 10;
                groove['Ride'][12] = ghostVel - 10;
            }

            updateSequencerVisuals();
        }

        // --- UI FRISSÍTÉSEK ---
        const seqDiv = document.getElementById('sequencer');
        
        function initSequencer() {
            seqDiv.innerHTML = '';
            instruments.forEach(inst => {
                const row = document.createElement('div');
                row.className = 'row';
                
                const label = document.createElement('div');
                label.className = 'row-label';
                label.innerText = inst === 'Ride' ? 'RD' : (inst === 'HiHat' ? 'HH' : (inst === 'Snare' ? 'SN' : 'KD'));
                row.appendChild(label);

                const stepsDiv = document.createElement('div');
                stepsDiv.className = 'steps';
                
                for(let i=0; i<16; i++) {
                    const step = document.createElement('div');
                    step.className = 'step';
                    step.id = `step-${inst}-${i}`;
                    stepsDiv.appendChild(step);
                }
                row.appendChild(stepsDiv);
                seqDiv.appendChild(row);
            });
        }

        function updateSequencerVisuals() {
            instruments.forEach(inst => {
                for(let i=0; i<16; i++) {
                    const step = document.getElementById(`step-${inst}-${i}`);
                    if (step) {
                        if (groove[inst][i] > 0) {
                            step.classList.add('active');
                            step.style.opacity = Math.max(0.2, groove[inst][i] / 127);
                        } else {
                            step.classList.remove('active');
                            step.style.opacity = 1;
                        }
                    }
                }
            });
        }

        function highlightStep(stepIndex) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            instruments.forEach(inst => {
                const el = document.getElementById(`step-${inst}-${stepIndex}`);
                if (el) el.classList.add('playing');
            });
        }

        // --- SZEKVENSER LOGIKA ---
        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            currentStep++;
            if (currentStep === 16) currentStep = 0;
        }

        function scheduleNote(stepNumber, time) {
            setTimeout(() => {
                if (isPlaying) highlightStep(stepNumber);
            }, (time - audioCtx.currentTime) * 1000);

            instruments.forEach(inst => {
                const vel = groove[inst][stepNumber];
                if (vel > 0) playSound(inst, vel, time);
            });
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentStep, nextNoteTime);
                nextNote();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        // --- ESEMÉNYKEZELŐK ---
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                isPlaying = false;
                playBtn.innerText = "Play";
                playBtn.style.color = "var(--accent)";
                clearTimeout(timerID);
                document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            } else {
                isPlaying = true;
                playBtn.innerText = "Stop";
                playBtn.style.color = "white";
                currentStep = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
            }
        });

        // ÚJ BPM KEZELÉS
        const bpmInput = document.getElementById('bpmInput');
        const bpmMinus = document.getElementById('bpmMinus');
        const bpmPlus = document.getElementById('bpmPlus');

        function updateBpm(newBpm) {
            bpm = Math.max(40, Math.min(300, newBpm));
            bpmInput.value = bpm;
        }

        bpmInput.addEventListener('change', (e) => updateBpm(parseInt(e.target.value)));
        bpmMinus.addEventListener('click', () => updateBpm(bpm - 5));
        bpmPlus.addEventListener('click', () => updateBpm(bpm + 5));

        // XY PAD KEZELÉS
        const xyPad = document.getElementById('xyPad');
        const puck = document.getElementById('puck');

        function updateXY(x, y) {
            const rect = xyPad.getBoundingClientRect();
            let px = Math.max(0, Math.min(x - rect.left, rect.width));
            let py = Math.max(0, Math.min(y - rect
