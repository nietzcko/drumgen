<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Drummer - Organic Metal Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --pad-bg: #2a2a2a;
            --accent: #e53935;
            --text-color: #888;
            --step-bg: #333;
            --step-active: #e53935;
            --step-current: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            align-items: baseline;
            gap: 10px;
            text-align: center;
        }

        .version {
            font-size: 12px;
            color: #666;
            font-weight: normal;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            gap: 8px;
            box-sizing: border-box;
            padding: 0 5px;
        }

        .main-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
            min-width: 0;
        }

        .main-btn:active { background-color: #444; }

        .param-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            padding: 8px 5px;
            border-radius: 12px;
            border: 1px solid #333;
            flex: 1;
            min-width: 0;
        }

        .param-label {
            font-size: 9px;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .param-controls {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .small-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .small-btn:active { background-color: #444; }

        input[type="number"] {
            width: 40px;
            height: 26px;
            text-align: center;
            background: #1a1a1a;
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            -moz-appearance: textfield;
            padding: 0;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tilt-wrapper {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: #aaa;
            width: 100%;
        }

        .tilt-wrapper input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
        }

        .xy-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            max-width: 90vw;
            max-height: 90vw;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .label {
            position: absolute;
            font-size: 12px;
            letter-spacing: 1px;
            pointer-events: none;
            color: #999;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
        .label.top { top: -22px; left: 50%; transform: translateX(-50%); color: var(--accent); }
        .label.bottom { bottom: -22px; left: 50%; transform: translateX(-50%); }
        .label.left { left: -50px; top: 50%; transform: translateY(-50%) rotate(-90deg); width: 60px; }
        .label.right { right: -50px; top: 50%; transform: translateY(-50%) rotate(90deg); width: 60px; color: var(--accent); }

        .xy-pad {
            width: 100%;
            height: 100%;
            background-color: var(--pad-bg);
            border: 2px solid #333;
            border-radius: 20px;
            position: relative;
            touch-action: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .xy-pad::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 10% 10%; 
            pointer-events: none;
        }

        .puck {
            width: 26px;
            height: 26px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent);
            pointer-events: none;
            z-index: 2;
        }

        .sequencer {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
            box-sizing: border-box;
            padding: 0 5px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .row-label {
            width: 25px;
            font-size: 11px;
            color: #aaa;
            text-align: right;
            padding-right: 5px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .steps {
            display: flex;
            flex: 1;
            justify-content: space-between;
            width: 100%;
        }

        .step {
            flex: 1;
            height: 25px;
            background-color: var(--step-bg);
            border-radius: 3px;
            transition: background-color 0.1s, opacity 0.1s;
            margin: 0 1px;
            min-width: 2px;
        }

        .step.active {
            background-color: var(--step-active);
        }

        .step.playing {
            background-color: var(--step-current) !important;
            box-shadow: 0 0 10px #fff;
        }

        .download-btn {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 100%;
            max-width: 390px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>Groove Generator <span class="version">v3.0 Smooth Flow</span></h1>

    <div class="controls-row">
        <button id="playBtn" class="main-btn">PLAY</button>
        
        <div class="param-box">
            <div class="param-label">BPM</div>
            <div class="param-controls">
                <button id="bpmMinus" class="small-btn">-</button>
                <input type="number" id="bpmInput" value="140" min="40" max="300">
                <button id="bpmPlus" class="small-btn">+</button>
            </div>
        </div>

        <div class="param-box">
            <div class="param-label">STEPS</div>
            <div class="param-controls">
                <button id="stepsMinus" class="small-btn">-</button>
                <input type="number" id="stepsInput" value="16" min="2" max="32">
                <button id="stepsPlus" class="small-btn">+</button>
            </div>
        </div>
    </div>

    <div class="tilt-wrapper">
        <input type="checkbox" id="tiltToggle">
        <label for="tiltToggle">Enable Tilt Control (Flat = Center)</label>
    </div>

    <div class="xy-wrapper">
        <span class="label top">Hate</span>
        <span class="label bottom">Calm</span>
        <span class="label left">Doom</span>
        <span class="label right">Blast</span>
        <div class="xy-pad" id="xyPad">
            <div class="puck" id="puck"></div>
        </div>
    </div>

    <div class="sequencer" id="sequencer">
    </div>

    <button id="downloadMidiBtn" class="download-btn">DOWNLOAD MIDI</button>

    <script>
        let isPlaying = false;
        let bpm = 140;
        let totalSteps = 16;
        let complexity = 0.5; // X Axis: Doom (0.0) to Blast (1.0)
        let loudness = 0.5;   // Y Axis: Calm (0.0) to Hate (1.0)
        let tiltEnabled = false;
        
        let currentStep = 0;
        let nextNoteTime = 0;
        let lookahead = 25; 
        let scheduleAheadTime = 0.1; 
        let timerID;

        const instruments = ['Cymbal', 'Snare', 'Kick'];
        let groove = {
            'Cymbal': [],
            'Snare': [],
            'Kick': []
        };

        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function getCymbalType() {
            if (loudness < 0.5) return 'ClosedHH';
            if (loudness < 0.8) return 'OpenHH';
            return 'Crash'; 
        }

        function playSound(inst, velocity, time) {
            if (!audioCtx) return;
            
            let gainMultiplier = 0.4 + (loudness * 0.6); 
            const vol = (velocity / 127) * gainMultiplier;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(vol, time);
            gainNode.connect(audioCtx.destination);

            if (inst === 'Kick') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gainNode);
                osc.start(time);
                osc.stop(time + 0.2);
                
            } else if (inst === 'Snare') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, time);
                
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                noise.connect(noiseFilter);
                noiseFilter.connect(gainNode);
                
                osc.connect(gainNode);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                
                osc.start(time);
                noise.start(time);
                osc.stop(time + 0.25);
                
            } else if (inst === 'Cymbal') {
                let type = getCymbalType();
                const noise = audioCtx.createBufferSource();
                
                if (type === 'Crash') {
                    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                    noise.buffer = buffer;

                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 4000; 
                    
                    noise.connect(filter);
                    filter.connect(gainNode);
                    
                    gainNode.gain.setValueAtTime(vol * 1.2, time); 
                    gainNode.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
                    noise.start(time);
                    
                } else {
                    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                    noise.buffer = buffer;

                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = type === 'OpenHH' ? 5000 : 7000;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    
                    let decay = type === 'OpenHH' ? 0.4 : 0.08;
                    gainNode.gain.exponentialRampToValueAtTime(0.001, time + decay);
                    noise.start(time);
                }
            }
        }

        // Egy determinisztikus, fix hash függvény, hogy a valószínűségi háló sose "villogjon"
        function getHash(i, instId) {
            let x = Math.sin(i * 12.9898 + instId * 78.233) * 43758.5453;
            return x - Math.floor(x);
        }

        // 5 Fő horgonypont meghatározása a folyamatos keveréshez
        function getAnchor(x, i, Q, H) {
            let pK = 0, pS = 0;
            if (x === 0) {
                // DOOM
                pK = (i === 0) ? 1 : 0;
                pS = (i === H) ? 1 : 0;
            } else if (x === 1) {
                // ROCK (2 pergő)
                pK = (i % H === 0) ? 1 : 0; 
                pS = (i % H === Q) ? 1 : 0; 
            } else if (x === 2) {
                // PUNK (4 pergő)
                pK = (i % Q === 0) ? 1 : 0; 
                pS = (i % Q === Math.floor(Q/2)) ? 1 : 0; 
            } else if (x === 3) {
                // BOMB BLAST (SNARE ON 1 / D-Beat feel)
                pK = (i % 2 === 0) ? 1 : 0; // Lábdob minden 8-adon
                pS = (i % Q === 0) ? 1 : 0; // Pergő csak az 1-eken (negyedeken)
            } else if (x === 4) {
                // ALTERNATING BLAST (Klasszikus váltott blast)
                pK = (i % 2 === 0) ? 1 : 0; // Lábdob a párosokon
                pS = (i % 2 !== 0) ? 1 : 0; // Pergő a páratlanokon (16-od)
            }
            return {pK, pS};
        }

        function generateGroove() {
            for(let inst in groove) {
                if(groove[inst].length !== totalSteps) {
                    groove[inst] = new Array(totalSteps).fill(0);
                } else {
                    groove[inst].fill(0);
                }
            }

            let Q = Math.floor(totalSteps / 4); 
            if (Q === 0) Q = 1;
            let H = Q * 2;

            // X Tengely Folytonos Interpolációja (0.0 -> 4.0 skálán)
            let virtX = complexity * 4.0;
            let idx1 = Math.floor(virtX);
            let idx2 = Math.min(4, idx1 + 1);
            let blend = virtX - idx1;

            let fillAmount = 1.0 - Math.pow(loudness, 1.2); 
            let slowFactor = 1.0 - complexity;

            let baseVel = Math.floor(60 + (loudness * 67)); 
            let ghostVel = Math.floor(baseVel * 0.45); 

            let cType = getCymbalType();

            for(let i = 0; i < totalSteps; i++) {
                
                // 1. Kick és Snare Alap Ritmus kiszámítása
                let a1 = getAnchor(idx1, i, Q, H);
                let a2 = getAnchor(idx2, i, Q, H);

                let probK = a1.pK * (1.0 - blend) + a2.pK * blend;
                let probS = a1.pS * (1.0 - blend) + a2.pS * blend;

                // 2. Szinkópák és Fillek hozzáadása (Y tengelytől függ)
                if (fillAmount > 0) {
                    // Finom pergő játék az üres tizenhatodokon és nyolcadokon
                    if (probS < 0.1 && probK < 0.1) {
                        let ghostP = 0.5 * fillAmount;
                        if (i % 2 !== 0) ghostP *= 0.5; // Tizenhatodokon ritkább
                        probS += ghostP;
                    }
                    // Exta lábdobok
                    if (probK < 0.1 && probS < 0.1 && i % 2 !== 0) {
                        probK += 0.4 * fillAmount * (1.0 - slowFactor); // Gyorsulásnál jönnek meg a lábdob fillek
                    }
                }

                // 3. Cintányér folytonos logikája
                let probC = 0;

                if (loudness < 0.5) { 
                    // CALM: Ritka alap, DE nagyon sok tizenhatodos kíséret a lassú zónában
                    if (i % Q === 0) probC = 1.0; 
                    else if (i % 2 === 0) probC = 0.5 + 0.5 * slowFactor; // 8-adok fixebbek alul
                    else probC = (1.0 - loudness) * slowFactor * 0.9; // Sok 16-od fill bal-alul!
                } 
                else if (loudness < 0.8) { 
                    // GROOVE: Stabil nyolcadok, fillek kikopnak
                    if (i % 2 === 0) probC = 1.0; 
                    else probC = (0.8 - loudness) * 2.0 * slowFactor; 
                } 
                else { 
                    // HATE: Nyers csapkodás
                    if (i % Q === 0) probC = 1.0; 
                    else if (i % 2 === 0) probC = (loudness - 0.8) * 5.0; // Fent a nyolcadok is kinyílnak
                    else probC = 0.0; // Zéró tizenhatod
                }

                // Blastbeat esetén (jobb szél) a cintányér igazodjon a lábdobhoz
                if (complexity > 0.8) {
                    let blastBlend = (complexity - 0.8) * 5.0;
                    if (i % 2 !== 0) {
                        probC *= (1.0 - blastBlend); // Eltüntetjük a 16-od cintányért
                    }
                }

                // 4. Megszólaltatás a stabil Hash alapján
                let hitK = getHash(i, 1) < probK;
                let hitS = getHash(i, 2) < probS;
                let hitC = getHash(i, 3) < probC;

                let kVel = 0;
                let sVel = 0;
                let cVel = 0;

                if (hitK) kVel = (probK >= 0.5 || i % Q === 0) ? baseVel : baseVel * 0.7;
                if (hitS) sVel = (probS >= 0.5) ? baseVel : ghostVel;
                if (hitC) cVel = (probC >= 0.5 || i % Q === 0) ? baseVel : ghostVel;

                groove['Kick'][i] = kVel;
                groove['Snare'][i] = sVel;
                groove['Cymbal'][i] = cVel;
            }

            updateSequencerVisuals();
        }

        const seqDiv = document.getElementById('sequencer');
        
        function initSequencer() {
            seqDiv.innerHTML = '';
            instruments.forEach(inst => {
                const row = document.createElement('div');
                row.className = 'row';
                
                const label = document.createElement('div');
                label.className = 'row-label';
                label.innerText = inst === 'Cymbal' ? 'CY' : (inst === 'Snare' ? 'SN' : 'KD');
                row.appendChild(label);

                const stepsDiv = document.createElement('div');
                stepsDiv.className = 'steps';
                
                for(let i=0; i<totalSteps; i++) {
                    const step = document.createElement('div');
                    step.className = 'step';
                    step.id = `step-${inst}-${i}`;
                    stepsDiv.appendChild(step);
                }
                row.appendChild(stepsDiv);
                seqDiv.appendChild(row);
            });
            generateGroove();
        }

        function updateSequencerVisuals() {
            instruments.forEach(inst => {
                for(let i=0; i<totalSteps; i++) {
                    const step = document.getElementById(`step-${inst}-${i}`);
                    if (step) {
                        if (groove[inst][i] > 0) {
                            step.classList.add('active');
                            step.style.opacity = Math.max(0.3, groove[inst][i] / 127);
                        } else {
                            step.classList.remove('active');
                            step.style.opacity = 1;
                        }
                    }
                }
            });
        }

        function highlightStep(stepIndex) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            instruments.forEach(inst => {
                const el = document.getElementById(`step-${inst}-${stepIndex}`);
                if (el) el.classList.add('playing');
            });
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            currentStep++;
            if (currentStep >= totalSteps) {
                currentStep = 0;
            }
        }

        function scheduleNote(stepNumber, time) {
            setTimeout(() => {
                if (isPlaying) highlightStep(stepNumber);
            }, (time - audioCtx.currentTime) * 1000);

            instruments.forEach(inst => {
                const vel = groove[inst][stepNumber];
                if (vel > 0) {
                    playSound(inst, vel, time);
                }
            });
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentStep, nextNoteTime);
                nextNote();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                isPlaying = false;
                playBtn.innerText = "PLAY";
                playBtn.style.color = "var(--accent)";
                clearTimeout(timerID);
                document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            } else {
                isPlaying = true;
                playBtn.innerText = "STOP";
                playBtn.style.color = "white";
                currentStep = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
            }
        });

        const bpmInput = document.getElementById('bpmInput');
        const btnBpmMinus = document.getElementById('bpmMinus');
        const btnBpmPlus = document.getElementById('bpmPlus');

        function updateBpm(newVal) {
            bpm = Math.max(40, Math.min(300, newVal));
            bpmInput.value = bpm;
        }

        bpmInput.addEventListener('change', (e) => updateBpm(e.target.value));
        btnBpmMinus.addEventListener('click', () => updateBpm(bpm - 5));
        btnBpmPlus.addEventListener('click', () => updateBpm(bpm + 5));

        const stepsInput = document.getElementById('stepsInput');
        const btnStepsMinus = document.getElementById('stepsMinus');
        const btnStepsPlus = document.getElementById('stepsPlus');

        function updateSteps(newVal) {
            totalSteps = Math.max(2, Math.min(32, newVal));
            stepsInput.value = totalSteps;
            initSequencer(); 
        }

        stepsInput.addEventListener('change', (e) => updateSteps(e.target.value));
        btnStepsMinus.addEventListener('click', () => updateSteps(totalSteps - 1));
        btnStepsPlus.addEventListener('click', () => updateSteps(totalSteps + 1));

        const xyPad = document.getElementById('xyPad');
        const puck = document.getElementById('puck');

        function updateXY(x, y) {
            const rect = xyPad.getBoundingClientRect();
            let px = Math.max(0, Math.min(x, rect.width));
            let py = Math.max(0, Math.min(y, rect.height));

            puck.style.left = `${px}px`;
            puck.style.top = `${py}px`;

            complexity = px / rect.width;
            loudness = 1.0 - (py / rect.height);
            
            generateGroove();
        }

        function handlePadMove(e) {
            if (tiltEnabled) return; 
            const rect = xyPad.getBoundingClientRect();
            if (e.touches) {
                e.preventDefault();
                updateXY(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            } else {
                if (e.buttons === 1) {
                    updateXY(e.clientX - rect.left, e.clientY - rect.top);
                }
            }
        }

        xyPad.addEventListener('mousedown', (e) => {
            if(!tiltEnabled) {
                const rect = xyPad.getBoundingClientRect();
                updateXY(e.clientX - rect.left, e.clientY - rect.top);
            }
        });
        xyPad.addEventListener('mousemove', handlePadMove);
        xyPad.addEventListener('touchstart', (e) => { 
            if(!tiltEnabled) {
                e.preventDefault(); 
                const rect = xyPad.getBoundingClientRect();
                updateXY(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); 
            }
        }, {passive: false});
        xyPad.addEventListener('touchmove', handlePadMove, {passive: false});

        const tiltToggle = document.getElementById('tiltToggle');

        tiltToggle.addEventListener('change', async (e) => {
            if (e.target.checked) {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            tiltEnabled = true;
                        } else {
                            alert('Gyroscopic control permission denied.');
                            e.target.checked = false;
                        }
                    } catch (error) {
                        console.error(error);
                        tiltEnabled = true; 
                    }
                } else {
                    tiltEnabled = true;
                }
            } else {
                tiltEnabled = false;
            }
        });

        window.addEventListener('deviceorientation', (e) => {
            if (!tiltEnabled) return;

            let gamma = e.gamma || 0; 
            let beta = e.beta || 0;   

            let xMapped = 0.5 + (gamma / 90);
            let yMapped = 0.5 - (beta / 90);

            xMapped = Math.max(0, Math.min(1, xMapped));
            yMapped = Math.max(0, Math.min(1, yMapped));

            const rect = xyPad.getBoundingClientRect();
            updateXY(xMapped * rect.width, yMapped * rect.height);
        });

        function toVLQ(n) {
            let buffer = [n & 0x7F];
            while ((n >>= 7)) { buffer.unshift((n & 0x7F) | 0x80); }
            return buffer;
        }

        document.getElementById('downloadMidiBtn').addEventListener('click', () => {
            const TICKS_PER_BEAT = 120;
            const TICKS_PER_16TH = TICKS_PER_BEAT / 4;
            
            let trackEvents = [];
            const microsecondsPerBeat = Math.round(60000000 / bpm);
            trackEvents.push(0x00, 0xFF, 0x51, 0x03, 
                (microsecondsPerBeat >> 16) & 0xFF, 
                (microsecondsPerBeat >> 8) & 0xFF, 
                microsecondsPerBeat & 0xFF);

            let eventsList = [];
            
            let cymbalNote = 42; 
            let cType = getCymbalType();
            if (cType === 'OpenHH') cymbalNote = 46;
            if (cType === 'Crash') cymbalNote = 49; 

            const midiNotes = { 'Kick': 36, 'Snare': 38, 'Cymbal': cymbalNote };

            for (let step = 0; step < totalSteps; step++) {
                instruments.forEach(inst => {
                    const vel = groove[inst][step];
                    if (vel > 0) {
                        eventsList.push({ step: step, type: 0x99, note: midiNotes[inst], vel: vel });
                        eventsList.push({ step: step + 0.9, type: 0x89, note: midiNotes[inst], vel: 0 });
                    }
                });
            }

            eventsList.sort((a, b) => a.step - b.step);

            let lastAbsoluteTick = 0;
            eventsList.forEach(ev => {
                let absoluteTick = Math.round(ev.step * TICKS_PER_16TH);
                let deltaTick = absoluteTick - lastAbsoluteTick;
                
                trackEvents.push(...toVLQ(deltaTick));
                trackEvents.push(ev.type, ev.note, ev.vel);

                lastAbsoluteTick = absoluteTick;
            });

            trackEvents.push(0x00, 0xFF, 0x2F, 0x00);

            const trackLen = trackEvents.length;
            const trackHeader = [
                0x4D, 0x54, 0x72, 0x6B,
                (trackLen >> 24) & 0xFF, (trackLen >> 16) & 0xFF, (trackLen >> 8) & 0xFF, trackLen & 0xFF
            ];

            const header = [
                0x4D, 0x54, 0x68, 0x64,
                0x00, 0x00, 0x00, 0x06,
                0x00, 0x00,
                0x00, 0x01,
                (TICKS_PER_BEAT >> 8) & 0xFF, TICKS_PER_BEAT & 0xFF
            ];

            const midiBytes = new Uint8Array([...header, ...trackHeader, ...trackEvents]);
            
            const blob = new Blob([midiBytes], { type: 'audio/midi' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `organic_metal_${bpm}bpm_${totalSteps}steps.mid`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        });

        initSequencer(); 
        
        setTimeout(() => {
            const rect = xyPad.getBoundingClientRect();
            updateXY(rect.width * 0.25, rect.height * 0.5);
        }, 100);

    </script>
</body>
</html>
