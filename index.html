<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Drummer Groove Generator - Metal Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --pad-bg: #2a2a2a;
            --accent: #e53935;
            --text-color: #888;
            --step-bg: #333;
            --step-active: #e53935;
            --step-current: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
        }

        h1 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .version {
            font-size: 12px;
            color: #666;
            font-weight: normal;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            align-items: center;
        }

        button.main-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
        }

        button.main-btn:active { background-color: #444; }

        .bpm-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .bpm-label {
            font-size: 12px;
            letter-spacing: 1px;
            color: #aaa;
        }

        .bpm-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .small-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 8px;
            width: 35px;
            height: 35px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .small-btn:active { background-color: #444; }

        input[type="number"] {
            width: 55px;
            height: 31px;
            text-align: center;
            background: #2a2a2a;
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            outline: none;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .xy-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .label {
            position: absolute;
            font-size: 11px;
            letter-spacing: 1px;
            pointer-events: none;
            color: #999;
            text-align: center;
        }
        .label.top { top: -20px; left: 50%; transform: translateX(-50%); }
        .label.bottom { bottom: -20px; left: 50%; transform: translateX(-50%); }
        .label.left { left: -50px; top: 50%; transform: translateY(-50%) rotate(-90deg); width: 60px; line-height: 1.1; }
        .label.right { right: -60px; top: 50%; transform: translateY(-50%) rotate(90deg); width: 80px; line-height: 1.1; }

        .xy-pad {
            width: 100%;
            height: 100%;
            background-color: var(--pad-bg);
            border: 2px solid #333;
            border-radius: 20px;
            position: relative;
            touch-action: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .xy-pad::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 14.28% 10%; /* 7 oszlop, 10 sor */
            pointer-events: none;
        }

        .puck {
            width: 26px;
            height: 26px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent);
            pointer-events: none;
            z-index: 2;
        }

        .sequencer {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .row-label {
            width: 40px;
            font-size: 11px;
            color: #aaa;
            text-align: right;
            padding-right: 10px;
            font-weight: bold;
        }

        .steps {
            display: flex;
            flex: 1;
            justify-content: space-between;
        }

        .step {
            width: 15px;
            height: 22px;
            background-color: var(--step-bg);
            border-radius: 3px;
            transition: background-color 0.1s, opacity 0.1s;
        }

        .step.active {
            background-color: var(--step-active);
        }

        .step.playing {
            background-color: var(--step-current) !important;
            box-shadow: 0 0 10px #fff;
        }

        .download-btn {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Groove Generator <span class="version">v1.4 Metal</span></h1>

    <div class="controls">
        <button id="playBtn" class="main-btn">Play</button>
        <div class="bpm-container">
            <div class="bpm-label">TEMPO (BPM)</div>
            <div class="bpm-controls">
                <button id="bpmMinus" class="small-btn">-</button>
                <input type="number" id="bpmInput" value="130" min="40" max="300">
                <button id="bpmPlus" class="small-btn">+</button>
            </div>
        </div>
    </div>

    <div class="xy-wrapper">
        <span class="label top">Open HH</span>
        <span class="label bottom">Closed HH</span>
        <span class="label left">Doom / Half-time</span>
        <span class="label right">Thrash / Blastbeat</span>
        <div class="xy-pad" id="xyPad">
            <div class="puck" id="puck"></div>
        </div>
    </div>

    <div class="sequencer" id="sequencer">
    </div>

    <button id="downloadMidiBtn" class="download-btn">⬇ MIDI Fájl Letöltése</button>

    <script>
        let isPlaying = false;
        let bpm = 130;
        let complexity = 0.5;
        let loudness = 0.5;
        
        let currentStep = 0;
        let nextNoteTime = 0;
        let lookahead = 25; 
        let scheduleAheadTime = 0.1; 
        let timerID;

        const instruments = ['OpenHH', 'HiHat', 'Snare', 'Kick'];
        let groove = {
            'OpenHH': new Array(16).fill(0),
            'HiHat': new Array(16).fill(0),
            'Snare': new Array(16).fill(0),
            'Kick': new Array(16).fill(0)
        };

        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(inst, velocity, time) {
            if (!audioCtx) return;
            
            let gainMultiplier = 0.4 + (loudness * 0.6); 
            const vol = (velocity / 127) * gainMultiplier;
            
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(vol, time);
            gainNode.connect(audioCtx.destination);

            if (inst === 'Kick') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gainNode);
                osc.start(time);
                osc.stop(time + 0.2);
                
            } else if (inst === 'Snare') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, time);
                
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                noise.connect(noiseFilter);
                noiseFilter.connect(gainNode);
                
                osc.connect(gainNode);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                
                osc.start(time);
                noise.start(time);
                osc.stop(time + 0.25);
                
            } else if (inst === 'HiHat') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 7000;
                
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.08); 
                
                noise.start(time);
                
            } else if (inst === 'OpenHH') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 5000; 

                noise.connect(filter);
                filter.connect(gainNode);
                
                gainNode.gain.setValueAtTime(vol * 0.8, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.4); 
                
                noise.start(time);
            }
        }

        let currentSeed = 0;
        function seededRandom() {
            let x = Math.sin(currentSeed++) * 10000;
            return x - Math.floor(x);
        }

        function generateGroove() {
            for(let inst in groove) groove[inst].fill(0);

            let baseVel = Math.floor(70 + (loudness * 57));
            let ghostVel = Math.floor(baseVel * 0.5);

            let zoneX = Math.floor(complexity * 15);
            let zoneY = Math.floor(loudness * 10);
            currentSeed = zoneX + (zoneY * 100); 

            // Stílus index meghatározása (0-tól 6-ig)
            let styleIndex = Math.floor(complexity * 6.99); 

            // --- 1. CINTÁNYÉROK ---
            let cymbalRhythm = 2; // Alap: Nyolcadok
            if (styleIndex === 0) cymbalRhythm = 4; // Negyedek
            if (styleIndex >= 4) cymbalRhythm = 2; 
            if (styleIndex === 6) cymbalRhythm = 1; // 16-odok

            for (let i = 0; i < 16; i += cymbalRhythm) {
                let isOpen = false;
                if (loudness > 0.8) isOpen = true;
                else if (loudness > 0.4 && (i % 4 === 0)) isOpen = true;
                else if (seededRandom() < (loudness * 0.5)) isOpen = true;

                let targetCymbal = isOpen ? 'OpenHH' : 'HiHat';
                groove[targetCymbal][i] = (i % 4 === 0) ? baseVel : ghostVel + 10;
            }

            // --- 2. LÁBDOB ÉS PERGŐ (Zónák szerint) ---
            switch(styleIndex) {
                case 0: 
                    // Half-time / Doom: Pergő csak a 3. negyeden
                    groove['Kick'][0] = baseVel;
                    if (seededRandom() > 0.5) groove['Kick'][2] = ghostVel;
                    groove['Snare'][8] = baseVel; 
                    if (seededRandom() > 0.6) groove['Kick'][14] = baseVel;
                    break;

                case 1: 
                    // Standard Rock: Pergő 2 és 4
                    groove['Kick'][0] = baseVel;
                    if (seededRandom() > 0.3) groove['Kick'][8] = baseVel;
                    groove['Snare'][4] = baseVel;
                    groove['Snare'][12] = baseVel;
                    if (seededRandom() > 0.7) groove['Kick'][10] = baseVel;
                    break;

                case 2: 
                    // Groove Metal: Szinkópák
                    groove['Kick'][0] = baseVel;
                    groove['Kick'][3] = baseVel;
                    if (seededRandom() > 0.4) groove['Kick'][8] = baseVel;
                    groove['Kick'][10] = baseVel;
                    groove['Snare'][4] = baseVel;
                    groove['Snare'][12] = baseVel;
                    groove['Snare'][7] = ghostVel; 
                    if (seededRandom() > 0.5) groove['Snare'][15] = ghostVel;
                    break;

                case 3: 
                    // Djent / Poliritmia
                    groove['Snare'][4] = baseVel;
                    groove['Snare'][12] = baseVel;
                    [0, 3, 6, 9, 14].forEach(pos => {
                        if (seededRandom() < 0.85) groove['Kick'][pos] = baseVel;
                    });
                    groove['Snare'][10] = ghostVel;
                    break;

                case 4: 
                    // Fast Punk / Thrash: Double time! Pergő minden "és"-en
                    groove['Kick'][0] = baseVel;
                    groove['Kick'][4] = baseVel;
                    groove['Kick'][8] = baseVel;
                    groove['Kick'][12] = baseVel;
                    groove['Snare'][2] = baseVel;
                    groove['Snare'][6] = baseVel;
                    groove['Snare'][10] = baseVel;
                    groove['Snare'][14] = baseVel;
                    if (seededRandom() > 0.5) groove['Kick'][15] = ghostVel;
                    break;

                case 5: 
                    // Duplázó: Folyamatos lábdob darálás
                    groove['Snare'][4] = baseVel;
                    groove['Snare'][12] = baseVel;
                    for(let i=0; i<16; i++) {
                        if (i !== 4 && i !== 12) groove['Kick'][i] = baseVel;
                    }
                    break;

                case 6: 
                    // Blastbeat: Váltott darálás mindenen
                    for(let i=0; i<16; i++) {
                        if (i % 2 === 0) {
                            groove['Kick'][i] = baseVel;
                            groove['Snare'][i] = ghostVel;
                        } else {
                            groove['Kick'][i] = ghostVel;
                            groove['Snare'][i] = baseVel;
                        }
                    }
                    break;
            }

            updateSequencerVisuals();
        }

        const seqDiv = document.getElementById('sequencer');
        
        function initSequencer() {
            seqDiv.innerHTML = '';
            instruments.forEach(inst => {
                const row = document.createElement('div');
                row.className = 'row';
                
                const label = document.createElement('div');
                label.className = 'row-label';
                label.innerText = inst === 'OpenHH' ? 'OH' : (inst === 'HiHat' ? 'CH' : (inst === 'Snare' ? 'SN' : 'KD'));
                row.appendChild(label);

                const stepsDiv = document.createElement('div');
                stepsDiv.className = 'steps';
                
                for(let i=0; i<16; i++) {
                    const step = document.createElement('div');
                    step.className = 'step';
                    step.id = `step-${inst}-${i}`;
                    stepsDiv.appendChild(step);
                }
                row.appendChild(stepsDiv);
                seqDiv.appendChild(row);
            });
        }

        function updateSequencerVisuals() {
            instruments.forEach(inst => {
                for(let i=0; i<16; i++) {
                    const step = document.getElementById(`step-${inst}-${i}`);
                    if (step) {
                        if (groove[inst][i] > 0) {
                            step.classList.add('active');
                            step.style.opacity = Math.max(0.3, groove[inst][i] / 127);
                        } else {
                            step.classList.remove('active');
                            step.style.opacity = 1;
                        }
                    }
                }
            });
        }

        function highlightStep(stepIndex) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            instruments.forEach(inst => {
                const el = document.getElementById(`step-${inst}-${stepIndex}`);
                if (el) el.classList.add('playing');
            });
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            currentStep++;
            if (currentStep === 16) {
                currentStep = 0;
            }
        }

        function scheduleNote(stepNumber, time) {
            setTimeout(() => {
                if (isPlaying) highlightStep(stepNumber);
            }, (time - audioCtx.currentTime) * 1000);

            instruments.forEach(inst => {
                const vel = groove[inst][stepNumber];
                if (vel > 0) {
                    playSound(inst, vel, time);
                }
            });
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentStep, nextNoteTime);
                nextNote();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                isPlaying = false;
                playBtn.innerText = "Play";
                playBtn.style.color = "var(--accent)";
                clearTimeout(timerID);
                document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            } else {
                isPlaying = true;
                playBtn.innerText = "Stop";
                playBtn.style.color = "white";
                currentStep = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
            }
        });

        const bpmInput = document.getElementById('bpmInput');
        const btnMinus = document.getElementById('bpmMinus');
        const btnPlus = document.getElementById('bpmPlus');

        function updateBpm(newVal) {
            bpm = Math.max(40, Math.min(300, newVal));
            bpmInput.value = bpm;
        }

        bpmInput.addEventListener('change', (e) => updateBpm(e.target.value));
        btnMinus.addEventListener('click', () => updateBpm(bpm - 5));
        btnPlus.addEventListener('click', () => updateBpm(bpm + 5));

        const xyPad = document.getElementById('xyPad');
        const puck = document.getElementById('puck');

        function updateXY(x, y) {
            const rect = xyPad.getBoundingClientRect();
            let px = Math.max(0, Math.min(x - rect.left, rect.width));
            let py = Math.max(0, Math.min(y - rect.top, rect.height));

            puck.style.left = `${px}px`;
            puck.style.top = `${py}px`;

            complexity = px / rect.width;
            loudness = 1.0 - (py / rect.height);
            
            generateGroove();
        }

        function handlePadMove(e) {
            if (e.touches) {
                e.preventDefault();
                updateXY(e.touches[0].clientX, e.touches[0].clientY);
            } else {
                if (e.buttons === 1) {
                    updateXY(e.clientX, e.clientY);
                }
            }
        }

        xyPad.addEventListener('mousedown', (e) => updateXY(e.clientX, e.clientY));
        xyPad.addEventListener('mousemove', handlePadMove);
        xyPad.addEventListener('touchstart', (e) => { e.preventDefault(); updateXY(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        xyPad.addEventListener('touchmove', handlePadMove, {passive: false});

        function toVLQ(n) {
            let buffer = [n & 0x7F];
            while ((n >>= 7)) { buffer.unshift((n & 0x7F) | 0x80); }
            return buffer;
        }

        document.getElementById('downloadMidiBtn').addEventListener('click', () => {
            const TICKS_PER_BEAT = 120;
            const TICKS_PER_16TH = TICKS_PER_BEAT / 4;
            const midiNotes = { 'Kick': 36, 'Snare': 38, 'HiHat': 42, 'OpenHH': 46 };

            let trackEvents = [];
            const microsecondsPerBeat = Math.round(60000000 / bpm);
            trackEvents.push(0x00, 0xFF, 0x51, 0x03, 
                (microsecondsPerBeat >> 16) & 0xFF, 
                (microsecondsPerBeat >> 8) & 0xFF, 
                microsecondsPerBeat & 0xFF);

            let eventsList = [];
            for (let step = 0; step < 16; step++) {
                instruments.forEach(inst => {
                    const vel = groove[inst][step];
                    if (vel > 0) {
                        eventsList.push({ step: step, type: 0x99, note: midiNotes[inst], vel: vel });
                        eventsList.push({ step: step + 0.9, type: 0x89, note: midiNotes[inst], vel: 0 });
                    }
                });
            }

            eventsList.sort((a, b) => a.step - b.step);

            let lastAbsoluteTick = 0;
            eventsList.forEach(ev => {
                let absoluteTick = Math.round(ev.step * TICKS_PER_16TH);
                let deltaTick = absoluteTick - lastAbsoluteTick;
                
                trackEvents.push(...toVLQ(deltaTick));
                trackEvents.push(ev.type, ev.note, ev.vel);

                lastAbsoluteTick = absoluteTick;
            });

            trackEvents.push(0x00, 0xFF, 0x2F, 0x00);

            const trackLen = trackEvents.length;
            const trackHeader = [
                0x4D, 0x54, 0x72, 0x6B,
                (trackLen >> 24) & 0xFF, (trackLen >> 16) & 0xFF, (trackLen >> 8) & 0xFF, trackLen & 0xFF
            ];

            const header = [
                0x4D, 0x54, 0x68, 0x64,
                0x00, 0x00, 0x00, 0x06,
                0x00, 0x00,
                0x00, 0x01,
                (TICKS_PER_BEAT >> 8) & 0xFF, TICKS_PER_BEAT & 0xFF
            ];

            const midiBytes = new Uint8Array([...header, ...trackHeader, ...trackEvents]);
            
            const blob = new Blob([midiBytes], { type: 'audio/midi' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `metal_groove_${bpm}bpm.mid`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        });

        initSequencer(); 
        generateGroove(); 
        
        setTimeout(() => {
            const rect = xyPad.getBoundingClientRect();
            // Indulás standard rock pozícióból (középtájon balra)
            updateXY(rect.width * 0.25, rect.height * 0.5);
        }, 100);

    </script>
</body>
</html>
