<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Drummer - Organic Metal Edition v6.6</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --pad-bg: #2a2a2a;
            --accent: #e53935;
            --text-color: #888;
            --step-bg: #333;
            --step-active: #e53935;
            --step-current: #fff;
        }

    html {
        background-color: #1a1a1a;
        min-height: 100%;
    }

    body {
        -webkit-tap-highlight-color: transparent;
        min-height: 100vh;
        background-color: #1a1a1a;
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 20px 10px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: pan-y;
        box-sizing: border-box;
    }

    h1 {
        color: var(--accent);
        font-size: 20px;
        margin-bottom: 10px;
        font-weight: 500;
        display: flex;
        align-items: baseline;
        gap: 10px;
        text-align: center;
    }

    .version {
        font-size: 12px;
        color: #666;
        font-weight: normal;
    }

    .controls-row {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 400px;
        margin-bottom: 20px;
        gap: 8px;
        box-sizing: border-box;
        padding: 0 5px;
    }

    .controls-top {
        display: flex;
        gap: 8px;
        width: 100%;
    }

    .controls-bottom {
        display: flex;
        gap: 8px;
        width: 100%;
    }

    .main-btn {
        background-color: var(--pad-bg);
        color: var(--accent);
        border: 1px solid #444;
        padding: 10px 15px;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        outline: none;
        font-weight: bold;
        text-transform: uppercase;
        flex: 1;
        min-width: 0;
    }

    .main-btn:active { background-color: #444; }

    .param-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #222;
        padding: 8px 5px;
        border-radius: 12px;
        border: 1px solid #333;
        flex: 1;
        min-width: 0;
    }

    .param-label {
        font-size: 9px;
        letter-spacing: 1px;
        color: #aaa;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .param-controls {
        display: flex;
        align-items: center;
        gap: 3px;
    }

    .small-btn {
        background-color: var(--pad-bg);
        color: var(--accent);
        border: 1px solid #444;
        border-radius: 6px;
        width: 28px;
        height: 28px;
        font-size: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        flex-shrink: 0;
    }

    .small-btn:active { background-color: #444; }

    .tap-btn {
        background-color: var(--pad-bg);
        color: #aaa;
        border: 1px solid #444;
        padding: 10px 15px;
        border-radius: 12px;
        font-size: 14px;
        cursor: pointer;
        outline: none;
        font-weight: bold;
        text-transform: uppercase;
        flex: 1;
        min-width: 0;
    }
    .tap-btn:active { background-color: #444; color: var(--accent); }

    input[type="number"] {
        width: 40px;
        height: 26px;
        text-align: center;
        background: #1a1a1a;
        color: var(--accent);
        border: 1px solid #444;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        outline: none;
        -moz-appearance: textfield;
        padding: 0;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    .tilt-wrapper {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 14px;
        color: #aaa;
        width: 100%;
    }

    .tilt-wrapper input[type="checkbox"] {
        accent-color: var(--accent);
        width: 18px;
        height: 18px;
    }

    /* FIX 1: reduced top margin so vertical space above pad is tighter */
    .xy-wrapper {
        position: relative;
        width: 300px;
        height: 300px;
        max-width: 85vw;
        max-height: 85vw;
        margin-top: 5px;   /* was 15px */
        margin-bottom: 35px;
    }

    .label {
        position: absolute;
        font-size: 13px;
        letter-spacing: 2px;
        pointer-events: none;
        color: #999;
        text-align: center;
        font-weight: 900;
        text-transform: uppercase;
        transition: color 0.15s ease;
    }
    .label.top { top: -25px; left: 50%; transform: translateX(-50%); }
    .label.bottom { bottom: -25px; left: 50%; transform: translateX(-50%); }
    /* FIX 2: wider left label area */
    .label.left { left: -75px; top: 50%; transform: translateY(-50%) rotate(-90deg); width: 100px; }
    .label.right { right: -75px; top: 50%; transform: translateY(-50%) rotate(90deg); width: 100px; }

    .xy-pad {
        width: 100%;
        height: 100%;
        background-color: var(--pad-bg);
        border: 2px solid #333;
        border-radius: 20px;
        position: relative;
        touch-action: none;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        overflow: hidden;
    }

    .xy-pad::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 10% 10%; 
        pointer-events: none;
    }

    /* FIX 3: puck color is now controlled via JS inline style */
    .puck {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 2;
        transition: background-color 0.1s, box-shadow 0.1s;
    }

    .sequencer {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 30px;
        box-sizing: border-box;
        padding: 0 5px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }

    .row-label {
        width: 25px;
        font-size: 11px;
        color: #aaa;
        text-align: right;
        padding-right: 5px;
        font-weight: bold;
        flex-shrink: 0;
    }

    .steps {
        display: flex;
        flex: 1;
        justify-content: space-between;
        width: 100%;
    }

    .step {
        flex: 1;
        height: 25px;
        background-color: var(--step-bg);
        border-radius: 3px;
        transition: background-color 0.1s, opacity 0.1s;
        margin: 0 1px;
        min-width: 2px;
    }

    .step.active {
        background-color: var(--step-active);
    }

    .step.playing {
        background-color: var(--step-current) !important;
        box-shadow: 0 0 10px #fff;
    }

    .wav-status {
        width: 100%;
        max-width: 390px;
        background: #222;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 15px;
        box-sizing: border-box;
        font-size: 11px;
        color: #666;
    }

    .wav-status-title {
        color: #aaa;
        font-size: 10px;
        letter-spacing: 1px;
        font-weight: bold;
        margin-bottom: 6px;
    }

    .wav-item {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
        border-bottom: 1px solid #2a2a2a;
    }

    .wav-item:last-child { border-bottom: none; }

    .wav-item .filename { color: #777; font-family: monospace; }

    .wav-ok { color: #4caf50; }
    .wav-missing { color: #555; }

    .download-btn {
        background-color: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        width: 100%;
        max-width: 390px;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        letter-spacing: 1px;
        box-sizing: border-box;
    }
</style>

</head>
<body>

<h1>Groove Engine <span class="version">v9</span></h1>

<div class="style-row" style="display:flex; gap:8px; justify-content:center; margin:10px auto; max-width:390px;">
    <button class="style-btn active" data-style="metal" style="flex:1; padding:10px; border-radius:8px; border:1px solid #444; background:#e53935; color:#fff; font-weight:bold; letter-spacing:1px; cursor:pointer;">METAL</button>
    <button class="style-btn" data-style="jazz" style="flex:1; padding:10px; border-radius:8px; border:1px solid #444; background:#222; color:#aaa; font-weight:bold; letter-spacing:1px; cursor:pointer;">JAZZ</button>
    <button class="style-btn" data-style="blues" style="flex:1; padding:10px; border-radius:8px; border:1px solid #444; background:#222; color:#aaa; font-weight:bold; letter-spacing:1px; cursor:pointer;">BLUES</button>
</div>

<div class="controls-row">
    <div class="controls-top">
        <button id="playBtn" class="main-btn">PLAY</button>
        <button id="tapBtn" class="tap-btn">TAP</button>
    </div>
    <div class="controls-bottom">
        <div class="param-box">
            <div class="param-label">BPM</div>
            <div class="param-controls">
                <button id="bpmMinus" class="small-btn">-</button>
                <input type="number" id="bpmInput" value="140" min="40" max="300">
                <button id="bpmPlus" class="small-btn">+</button>
            </div>
        </div>
        <div class="param-box">
            <div class="param-label">STEPS</div>
            <div class="param-controls">
                <button id="stepsMinus" class="small-btn">-</button>
                <input type="number" id="stepsInput" value="16" min="2" max="32">
                <button id="stepsPlus" class="small-btn">+</button>
            </div>
        </div>
    </div>
</div>

<div class="xy-wrapper">
    <span class="label top" id="labelTop">Loud</span>
    <span class="label bottom" id="labelBottom">Sparse</span>
    <span class="label left" id="labelLeft">Slow</span>
    <span class="label right" id="labelRight">Fast</span>
    <div class="xy-pad" id="xyPad">
        <div class="puck" id="puck"></div>
    </div>
</div>

<div class="sequencer" id="sequencer">
</div>

<div class="tilt-wrapper">
    <input type="checkbox" id="tiltToggle">
    <label for="tiltToggle">Tilt Control (experimental, calibrates on check)</label>
</div>

<div class="wav-status" id="wavStatus">
    <div class="wav-status-title">SAMPLES</div>
    <div id="wavList"></div>
</div>

<button id="downloadMidiBtn" class="download-btn">DOWNLOAD MIDI</button>

<script>
    let isPlaying = false;
    let bpm = 140;
    let totalSteps = 16;
    let complexity = 0.5; // X Axis (slow -> fast)
    let loudness = 0.5;   // Y Axis (sparse -> loud)
    let currentStyle = 'metal'; // 'metal' | 'jazz' | 'blues'

    // Accent color per style: metal=red, jazz=yellow, blues=blue. Used for the
    // CSS theme (steps, puck glow) and the puck/label proximity lerps.
    const STYLE_COLORS = {
        metal: { r: 229, g: 57,  b: 53,  hex: '#e53935' }, // red
        jazz:  { r: 240, g: 192, b: 32,  hex: '#f0c020' }, // yellow/amber
        blues: { r: 51,  g: 133, b: 229, hex: '#3385e5' }, // blue
    };
    function accentRGB() { return STYLE_COLORS[currentStyle]; }
    function applyStyleTheme() {
        const c = STYLE_COLORS[currentStyle];
        document.documentElement.style.setProperty('--accent', c.hex);
        document.documentElement.style.setProperty('--step-active', c.hex);
    }
    
    let tiltEnabled = false;
    let needsCalibration = false;
    let baseGamma = 0;
    let baseBeta = 0;
    const tiltSensitivity = 2.5; 
    
    let currentStep = 0;
    let nextNoteTime = 0;
    let lookahead = 25; 
    let scheduleAheadTime = 0.1; 
    let timerID;

    const instruments = ['Cymbal', 'Snare', 'Kick'];
    let groove = { 'Cymbal': [], 'Snare': [], 'Kick': [] };

    let audioCtx;
    const wavBuffers = {};
    const wavFiles = {
        'kick':         'kick.wav',
        'snare':        'snare.wav',
        'snare_ghost':  'snare_ghost.wav',
        'hihat_closed': 'hihat_closed.wav',
        'hihat_open':   'hihat_open.wav',
        'crash':        'crash.wav',
    };

    function updateWavStatusUI() {
        const list = document.getElementById('wavList');
        if (!list) return;
        const labels = {
            'kick': 'kick.wav', 'snare': 'snare.wav', 'snare_ghost': 'snare_ghost.wav',
            'hihat_closed': 'hihat_closed.wav', 'hihat_open': 'hihat_open.wav', 'crash': 'crash.wav'
        };
        const descriptions = {
            'kick': 'Kick drum', 'snare': 'Snare', 'snare_ghost': 'Snare ghost (optional)',
            'hihat_closed': 'Closed hi-hat', 'hihat_open': 'Open hi-hat', 'crash': 'Crash cymbal'
        };
        list.innerHTML = Object.entries(labels).map(([key, file]) => {
            const loaded = !!wavBuffers[key];
            return `<div class="wav-item">
                <span class="filename">${file}</span>
                <span class="${loaded ? 'wav-ok' : 'wav-missing'}">${loaded ? '✓ loaded' : descriptions[key] === 'Snare ghost (optional)' ? '— synthesized' : '— synthesized'}</span>
            </div>`;
        }).join('');
    }

    async function loadWavBuffers() {
        for (const [key, file] of Object.entries(wavFiles)) {
            try {
                const res = await fetch(file);
                if (!res.ok) continue;
                const arrayBuf = await res.arrayBuffer();
                wavBuffers[key] = await audioCtx.decodeAudioData(arrayBuf);
            } catch(e) {
                // file not found or decode error - fall back to synth
            }
        }
        updateWavStatusUI();
    }

    // Show default state on load
    window.addEventListener('DOMContentLoaded', () => updateWavStatusUI());

    function playWav(key, vol, time) {
        if (!wavBuffers[key]) return false;
        const src = audioCtx.createBufferSource();
        src.buffer = wavBuffers[key];
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(Math.min(1, vol), time);
        src.connect(gain);
        gain.connect(audioCtx.destination);
        src.start(time);
        return true;
    }

    async function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            await loadWavBuffers();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // FIX 3: Update puck color and label colors based on proximity to axes
    function updatePuckAndLabels() {
        const puck = document.getElementById('puck');
        const labelTop = document.getElementById('labelTop');
        const labelBottom = document.getElementById('labelBottom');
        const labelLeft = document.getElementById('labelLeft');
        const labelRight = document.getElementById('labelRight');

        // loudness = Y (0=bottom/Void, 1=top/Hate)
        // complexity = X (0=left/Doom, 1=right/Blast)
        const distTop    = 1.0 - loudness;   // distance from Hate (top)
        const distBottom = loudness;           // distance from Void (bottom)
        const distLeft   = complexity;         // distance from Doom (left)
        const distRight  = 1.0 - complexity;  // distance from Blast (right)

        const minDist = Math.min(distTop, distBottom, distLeft, distRight);

        // Puck color: lerp from grey (#666) to the current STYLE accent based on proximity
        const ac = accentRGB();
        const proximity = Math.max(0, 1 - minDist * 2);
        const r = Math.round(102 + (ac.r - 102) * proximity);
        const g = Math.round(102 + (ac.g - 102) * proximity);
        const b = Math.round(102 + (ac.b - 102) * proximity);
        const color = `rgb(${r},${g},${b})`;
        puck.style.backgroundColor = color;
        puck.style.boxShadow = proximity > 0.1 ? `0 0 ${8 + proximity * 12}px ${color}` : 'none';

        // Label colors: each label gets the accent when its axis is close, grey otherwise
        function labelColor(dist) {
            const p = Math.max(0, 1 - dist * 2);
            const lr = Math.round(102 + (ac.r - 102) * p);
            const lg = Math.round(102 + (ac.g - 102) * p);
            const lb = Math.round(102 + (ac.b - 102) * p);
            return `rgb(${lr},${lg},${lb})`;
        }
        labelTop.style.color    = labelColor(distTop);
        labelBottom.style.color = labelColor(distBottom);
        labelLeft.style.color   = labelColor(distLeft);
        labelRight.style.color  = labelColor(distRight);
    }

    // Cymbal SOUND selection along the continuous intensity axis (gx = X, 0..1)
    // and energy (loudness = Y). Low intensity + low energy = jazzy ride/closed hat;
    // rising energy opens the hat; high intensity/energy brings crash & china.
    function getCymbalType(mI) {
        const gx = complexity;        // intensity/speed axis
        const e  = loudness;          // energy axis
        const onBeat = (mI % 4 === 0);

        // JAZZ & BLUES: ride-led. No crash wall — the open-hat voice stands in for
        // the ride (sustained beat pulse), closed hat for the swung skip notes.
        if (currentStyle === 'jazz' || currentStyle === 'blues') {
            // beats ring like a ride; the swung "and" is a tighter stick sound
            return onBeat ? 'OpenHH' : 'ClosedHH';
        }

        // METAL (default): crashes appear as energy AND intensity climb.
        if (e > 0.80 && gx > 0.55) {
            return onBeat ? 'Crash' : 'OpenHH';
        }
        if (e > 0.62) {
            if (onBeat && gx > 0.4) return (mI === 0) ? 'Crash' : 'OpenHH';
            return (mI % 2 === 0) ? 'OpenHH' : 'ClosedHH';
        }
        if (e > 0.40) {
            return onBeat ? 'OpenHH' : 'ClosedHH';
        }
        if (gx < 0.35) return onBeat ? 'OpenHH' : 'ClosedHH';
        return 'ClosedHH';
    }

    function playSoundSynth(inst, velocity, time, mI) {
        // Fallback szintetizált hangok ha nincs WAV
        const gainMultiplier = 0.4 + (loudness * 0.6);
        const vol = (velocity / 127) * gainMultiplier;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(vol, time);
        gainNode.connect(audioCtx.destination);

        if (inst === 'Kick') {
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(250, time);
            osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.2);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
            osc.connect(gainNode);
            osc.start(time); osc.stop(time + 0.2);
        } else if (inst === 'Snare') {
            const osc = audioCtx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, time);
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.value = 1000;
            noise.connect(noiseFilter); noiseFilter.connect(gainNode); osc.connect(gainNode);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
            osc.start(time); noise.start(time); osc.stop(time + 0.25);
        } else if (inst === 'Cymbal') {
            let type = getCymbalType(mI || 0);
            const noise = audioCtx.createBufferSource();
            if (type === 'Crash') {
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = 4000;
                noise.connect(filter); filter.connect(gainNode);
                gainNode.gain.setValueAtTime(vol * 0.85, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
                noise.start(time);
            } else {
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = type === 'OpenHH' ? 5000 : 7000;
                noise.connect(filter); filter.connect(gainNode);
                let decay = (type === 'OpenHH' && velocity < 85) ? 0.08 : (type === 'OpenHH' ? 0.4 : 0.08);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + decay);
                noise.start(time);
            }
        }
    }

    function playSound(inst, velocity, time, mI) {
        if (!audioCtx) return;
        const gainMultiplier = 0.4 + (loudness * 0.6);
        const vol = (velocity / 127) * gainMultiplier;
        const isGhost = velocity < drumVelThresholdGhost;

        if (inst === 'Kick') {
            if (!playWav('kick', vol, time)) playSoundSynth(inst, velocity, time, mI);
        } else if (inst === 'Snare') {
            if (isGhost) {
                if (!playWav('snare_ghost', vol, time)) playWav('snare', vol * 0.4, time) || playSoundSynth(inst, velocity, time, mI);
            } else {
                if (!playWav('snare', vol, time)) playSoundSynth(inst, velocity, time, mI);
            }
        } else if (inst === 'Cymbal') {
            const type = getCymbalType(mI || 0);
            if (type === 'Crash') {
                if (!playWav('crash', vol, time)) playSoundSynth(inst, velocity, time, mI);
            } else if (type === 'OpenHH') {
                if (!playWav('hihat_open', vol, time)) playSoundSynth(inst, velocity, time, mI);
            } else {
                if (!playWav('hihat_closed', vol, time)) playSoundSynth(inst, velocity, time, mI);
            }
        }
    }

    // Ghost velocity threshold (snare velocity alatt ez) - drumVel 30%-a
    let drumVelThreshold = 40;

    // Ghost velocity threshold (below this = ghost snare sample)
    let drumVelThresholdGhost = 45;

    // ---- Proper PRNG (mulberry32): uniform, deterministic, no Math.sin clumping ----
    let _rngState = 0;
    function seedRng(s) { _rngState = (s >>> 0) || 1; }
    function rng() {
        _rngState |= 0; _rngState = (_rngState + 0x6D2B79F5) | 0;
        let t = Math.imul(_rngState ^ (_rngState >>> 15), 1 | _rngState);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    function chance(p) { return rng() < p; }
    // back-compat alias
    function seededRandom() { return rng(); }

    /*
       GROOVE ENGINE v8 — CONTINUOUS INTENSITY MODEL
       ----------------------------------------------
       No zones, no steps. Two continuous axes drive a set of "knobs", and each
       instrument lane is generated probabilistically per 16th-note from those
       knobs. Everything interpolates smoothly across the pad.

         X (complexity) = INTENSITY / SPEED-FEEL  (0 = slow jazz+doom blend,
                          1 = fast & heavy / blast)
         Y (loudness)   = ENERGY (0 = sparse & quiet, 1 = dense & loud)

       The same X-position always travels the SAME musical road:
         left  : spacious, ride-led, swinging-but-straight, snare cross-stick
                 feel, sparse kick, lots of gaps  (jazz/doom)
         mid   : backbeat rock/groove, syncopated kick
         right : double-bass subdivisions, blast-leaning, dense & aggressive
       Y layered on top decides how FULL and LOUD that road gets.
    */

    // smoothstep for nice non-linear ramps
    function ss(a, b, x) {
        const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
        return t * t * (3 - 2 * t);
    }
    function lerp(a, b, t) { return a + (b - a) * t; }

    // Derive all generative knobs from the two axes. Pure function of (gx, e).
    function deriveKnobs(gx, e) {
        return {
            gx, e,
            // how finely the kick subdivides: 0≈quarter/half feel → 1≈16th double-bass
            kickDensity:   lerp(0.05, 1.0, ss(0.15, 1.0, gx)) * lerp(0.5, 1.0, e),
            // probability the kick plays straight 8ths vs syncopated placement
            kickDrive:     ss(0.45, 1.0, gx),
            // snare ghost / comp note density — high at jazz end (comping) & high energy
            ghost:         lerp(0.15, 0.5, ss(0.0, 0.4, 1 - gx)) * lerp(0.4, 1.3, e),
            // ride / hat density (how many cymbal subdivisions)
            rideDensity:   lerp(0.35, 1.0, Math.max(ss(0.0, 0.5, e), ss(0.5, 1.0, gx))),
            // overall syncopation / looseness, strongest at the jazz end
            synco:         lerp(0.55, 0.1, ss(0.0, 0.6, gx)),
            // velocity floor/ceiling from energy
            velLo:         lerp(38, 80, e),
            velHi:         lerp(78, 120, e),
            // accent depth (difference between accented & unaccented hits)
            accent:        lerp(0.55, 0.85, 1 - e * 0.3),
        };
    }

    // ---- SNARE STAGE: the X axis is organised as a LOGARITHMIC climb in the
    // number of main snare hits per bar, 1 → 8 (left → right):
    //   2^(3x) ≈ 1, 2, 3, 4, 5, 6, 8.  Low counts get the widest bands (log feel),
    //   high counts compress near the right edge. Each count maps to a musical
    //   placement so every stage is a recognisable groove — including the classic
    //   2-snare backbeat. Returns { count, snareSteps[], kickBeats[] }.
    function snareStage(gx) {
        // continuous count then snap to the log ladder
        const raw = Math.pow(2, 3 * Math.max(0, Math.min(1, gx)));   // 1..8
        const ladder = [1, 2, 3, 4, 5, 6, 8];
        let count = ladder[0];
        for (const c of ladder) if (raw >= c - 0.5) count = c;

        // snare placement + the kick "beats" that anchor that groove
        switch (count) {
            case 1: return { count, snareSteps: [8],                          kickBeats: [0] };           // half-time: snare on 3
            case 2: return { count, snareSteps: [4, 12],                      kickBeats: [0, 8] };        // BACKBEAT 2 & 4
            case 3: return { count, snareSteps: [4, 8, 12],                   kickBeats: [0] };           // backbeat + 3
            case 4: return { count, snareSteps: [2, 6, 10, 14],               kickBeats: [0, 4, 8, 12] }; // SKANK: snare on the &s
            case 5: return { count, snareSteps: [2, 4, 6, 10, 14],            kickBeats: [0, 8, 12] };    // skank + a backbeat
            case 6: return { count, snareSteps: [2, 4, 6, 10, 12, 14],        kickBeats: [0, 8] };        // skank + backbeat
            default:return { count, snareSteps: [0,2,4,6,8,10,12,14],         kickBeats: [0,4,8,12] };    // 8: every 8th
        }
    }

    // weighted velocity helper given knobs, an accent flag, and the 16th position
    function vel(k, accentStrength, mI) {
        const sub = mI % 4;
        let base = lerp(k.velLo, k.velHi, accentStrength);
        // metric accent: beats > offbeats > in-between
        if (sub === 0) base *= 1.0;
        else if (sub === 2) base *= 0.86;
        else base *= 0.72;
        // human drift
        base += (rng() - 0.5) * 10;
        return Math.max(1, Math.min(127, Math.round(base)));
    }

    function generateGroove() {
        for (let inst in groove) groove[inst] = new Array(totalSteps).fill(0);

        const gx = complexity, e = loudness;
        // STABILITY: the pattern skeleton only re-rolls when the puck crosses into a
        // new coarse cell (~10 cells per axis). The KNOBS below still read the raw
        // continuous gx/e, so the FEEL morphs smoothly between regenerations while
        // the pattern itself stays put for small movements. No clock term => the
        // same cell always reproduces the same groove (no churn while holding still).
        const CELLS = 10;
        const cellX = Math.round(gx * CELLS);
        const cellY = Math.round(e * CELLS);
        seedRng(((cellX * 73856093) ^ (cellY * 19349663)) >>> 0);

        if (currentStyle === 'jazz')  { generateJazz(gx, e);  updateSequencerVisuals(); updatePuckAndLabels(); return; }
        if (currentStyle === 'blues') { generateBlues(gx, e); updateSequencerVisuals(); updatePuckAndLabels(); return; }

        const k = deriveKnobs(gx, e);
        const bars = Math.ceil(totalSteps / 16);

        for (let bar = 0; bar < bars; bar++) {
            const barStart = bar * 16;
            const isFillBar = (bars > 1) && (bar % 2 === 1) && (barStart + 8 < totalSteps);

            // The snare groove for this whole bar: a log-spaced count (1..8) with a
            // musical placement, plus the kick beats that anchor it.
            const stage = snareStage(gx);
            const snareSet = new Set(stage.snareSteps);
            const kickSet  = new Set(stage.kickBeats);

            for (let mI = 0; mI < 16; mI++) {
                const i = barStart + mI;
                if (i >= totalSteps) break;
                const sub = mI % 4;
                const onBeat = sub === 0;

                // ============ FILL (last bar of phrase) ============
                if (isFillBar && mI >= 12 - Math.round(k.gx * 4)) {
                    // tom/snare-led fill that intensifies toward the end; busier at high X
                    const prog = (mI - (12 - Math.round(k.gx * 4))) / 4;
                    if (rng() < 0.6 + k.gx * 0.4) {
                        groove['Snare'][i] = vel(k, 0.7 + prog * 0.3, mI);
                        if (k.gx > 0.5 && mI % 2 === 0) groove['Kick'][i] = vel(k, 0.7, mI);
                    }
                    groove['Cymbal'][i] = (mI === 12) ? vel(k, 1.0, mI) : 0;
                    continue;
                }

                // ============ SNARE (from the log-spaced stage) ============
                let snareHere = false, snareAcc = 0.9;
                if (snareSet.has(mI)) {
                    snareHere = true;
                    // beats 2 & 4 are the loudest voice when present; others a touch less
                    snareAcc = (mI === 4 || mI === 12) ? 0.95 : 0.86;
                } else if (!onBeat && rng() < k.ghost * (sub === 2 ? 0.5 : 0.7)) {
                    // ghost / comp notes around the main hits (kept off the main steps)
                    snareHere = true; snareAcc = 0.18 + rng() * 0.15;
                }

                // ============ KICK ============
                // Anchor on the stage's kick beats; fill between with density-driven
                // subdivisions (8ths, then gallops / double-bass) as we move right.
                let kp;
                if (kickSet.has(mI)) {
                    kp = 0.97;                                   // the groove's anchor kicks
                } else if (onBeat) {
                    kp = 0.30 + k.kickDrive * 0.4 + k.kickDensity * 0.25;
                } else if (sub === 2) {                          // the "&"
                    kp = 0.12 + k.kickDrive * 0.4 + k.kickDensity * 0.35;
                } else {                                         // 16th subdivisions
                    kp = (k.kickDensity - 0.45) * 1.3 + k.synco * 0.15;
                }
                // double-bass phrasing: when dense, bias toward grouped 16ths (gallops)
                if (k.kickDensity > 0.6 && !onBeat && sub !== 2) {
                    kp += (mI % 4 === 1) ? 0.25 : 0.12;
                }
                // keep the kick off the snare's off-beat hits (skank stages) so the
                // snare backbeat reads cleanly — unless we're very dense (blast).
                if (snareSet.has(mI) && !onBeat && k.kickDensity < 0.85) kp = 0.0;
                let kickHere = rng() < kp;

                // avoid kick+snare stacking on weak ghost notes (keeps it clean)
                if (kickHere && snareHere && snareAcc < 0.4 && rng() < 0.6) snareHere = false;

                if (kickHere) groove['Kick'][i]  = vel(k, onBeat ? 0.95 : 0.78, mI);
                if (snareHere) {
                    let sv = vel(k, snareAcc, mI);
                    if (snareAcc < 0.4) sv = Math.min(sv, drumVelThresholdGhost - 3); // force ghost sample
                    groove['Snare'][i] = sv;
                }

                // ============ CYMBAL (ride / hat) ============
                groove['Cymbal'][i] = cymbalLane(k, mI);
            }
        }

        // Crash on the very first hit when there's real energy/intensity (the "1")
        if (e > 0.45 && totalSteps > 0) {
            groove['Cymbal'][0] = Math.min(127, vel(k, 1.0, 0) + 15);
        }
        // Crash resolves each phrase fill on the following downbeat
        for (let bar = 1; bar < bars; bar++) {
            const isFillBar = (bars > 1) && (bar % 2 === 1) && (bar * 16 + 8 < totalSteps);
            const resolve = (bar + 1) * 16;
            if (isFillBar && resolve < totalSteps) {
                groove['Cymbal'][resolve] = Math.min(127, vel(k, 1.0, 0) + 15);
                if (groove['Kick'][resolve] === 0) groove['Kick'][resolve] = vel(k, 0.95, 0);
            }
        }

        updateSequencerVisuals();
        updatePuckAndLabels();
    }

    // ==================== JAZZ ====================
    // Ride-led swing. The ride plays the "spang-a-lang": a hit on every beat plus
    // the swung "and" of beats 2 & 4 (the skip note). Hi-hat foot chips 2 & 4.
    // Kick "feathers" 1 (quiet) at low energy and drops syncopated "bombs" as
    // energy/intensity rise. Snare comps with cross-stick & ghost bursts.
    // X = tempo/busyness (ballad -> uptempo bop), Y = energy/interaction.
    // (Swing timing is applied in the scheduler; here we just place 16th-grid hits,
    //  using the offbeat-8th slot mI%4==2 as the swung "and".)
    function generateJazz(gx, e) {
        const velLo = lerp(30, 60, e), velHi = lerp(60, 104, e);
        const jv = (a, mI) => {
            let base = lerp(velLo, velHi, a);
            if (mI % 4 === 0) base *= 1.0; else if (mI % 4 === 2) base *= 0.9; else base *= 0.7;
            base += (rng() - 0.5) * 9;
            return Math.max(1, Math.min(127, Math.round(base)));
        };
        const bombProb   = ss(0.0, 1.0, gx) * lerp(0.15, 0.6, e);   // kick "bombs"
        const compProb   = lerp(0.18, 0.55, e) * lerp(0.7, 1.2, ss(0.2, 1.0, gx)); // snare comping
        const rideSkip   = lerp(0.6, 1.0, e);   // how reliably the skip note sounds
        const featherKick = e < 0.45;            // quiet kick on every beat at low energy

        for (let i = 0; i < totalSteps; i++) {
            const mI = i % 16, sub = mI % 4, onBeat = sub === 0;
            const beat = Math.floor(mI / 4); // 0..3 within the bar

            // ---- RIDE (spang-a-lang) ----
            if (onBeat) {
                groove['Cymbal'][i] = jv(0.85, mI);                 // every beat
            } else if (sub === 2 && (beat === 1 || beat === 3)) {
                // the skip note: swung "and" of beats 2 & 4
                if (rng() < rideSkip) groove['Cymbal'][i] = jv(0.62, mI);
            } else if (sub === 2 && rng() < rideSkip * 0.5 * ss(0.4,1.0,gx)) {
                // busier ride on faster/uptempo settings: skip on 1 & 3 too
                groove['Cymbal'][i] = jv(0.55, mI);
            }

            // ---- HI-HAT FOOT on 2 & 4 ---- (use Cymbal lane already busy; put a
            // soft chick by reinforcing the ride on 2 & 4 beats — keep subtle)
            // (kept implicit via ride accent to avoid a 4th voice)

            // ---- KICK ----
            if (mI === 0 && (featherKick || rng() < 0.5)) {
                groove['Kick'][i] = featherKick ? jv(0.28, mI) : jv(0.6, mI); // feather/anchor 1
            } else if (featherKick && onBeat) {
                groove['Kick'][i] = jv(0.25, mI); // feathered quarter notes, very soft
            } else if (!onBeat && sub === 2 && rng() < bombProb) {
                groove['Kick'][i] = jv(0.7, mI); // syncopated bomb
            } else if (onBeat && beat !== 0 && rng() < bombProb * 0.6) {
                groove['Kick'][i] = jv(0.6, mI);
            }

            // ---- SNARE comping (cross-stick / ghosts, swung placement) ----
            if (sub === 2 && rng() < compProb) {
                groove['Snare'][i] = jv(0.2 + rng() * 0.25, mI); // soft comp on the "and"
            } else if (!onBeat && rng() < compProb * 0.5) {
                let sv = jv(0.16, mI);
                groove['Snare'][i] = Math.min(sv, drumVelThresholdGhost - 3); // ghost
            } else if (mI === 12 && rng() < lerp(0.1, 0.4, e)) {
                groove['Snare'][i] = jv(0.55, mI); // occasional rim accent on 4
            }
        }
    }

    // ==================== BLUES (SHUFFLE) ====================
    // Triplet shuffle. Strong backbeat on 2 & 4 is the anchor. Shuffle ride/hat
    // plays each beat + the swung last-triplet "skip". Kick on 1 (and 3, walking
    // more on the right). Slow 12/8 blues on the left -> faster shuffle on the right.
    function generateBlues(gx, e) {
        const velLo = lerp(34, 70, e), velHi = lerp(66, 112, e);
        const bv = (a, mI) => {
            let base = lerp(velLo, velHi, a);
            if (mI % 4 === 0) base *= 1.0; else if (mI % 4 === 2) base *= 0.88; else base *= 0.66;
            base += (rng() - 0.5) * 9;
            return Math.max(1, Math.min(127, Math.round(base)));
        };
        const shuffleSkip = lerp(0.7, 1.0, e);              // skip-note reliability
        const kickWalk    = ss(0.4, 1.0, gx) * lerp(0.3, 0.8, e); // extra kicks (walking)

        for (let i = 0; i < totalSteps; i++) {
            const mI = i % 16, sub = mI % 4, onBeat = sub === 0;
            const beat = Math.floor(mI / 4);

            // ---- SHUFFLE RIDE/HAT: beat + swung skip (the "and-a" triplet feel) ----
            if (onBeat) {
                groove['Cymbal'][i] = bv(0.8, mI);
            } else if (sub === 2) {
                // the skip note (shuffle's signature), placed on every beat
                if (rng() < shuffleSkip) groove['Cymbal'][i] = bv(0.5, mI);
            }

            // ---- BACKBEAT SNARE on 2 & 4 (the anchor) ----
            // ---- BACKBEAT SNARE on 2 & 4 + shuffle ghost chatter ----
            if (mI === 4 || mI === 12) {
                // backbeat with real dynamic variation (not a flat 0.95 every bar)
                groove['Snare'][i] = bv(0.78 + rng() * 0.2, mI);
            } else if (sub === 2) {
                // the swung "skip" slot: prime spot for shuffle ghost notes. These
                // are the chatter that makes a shuffle feel alive. Denser to the right.
                const skipGhost = lerp(0.25, 0.7, e) * ss(0.0, 0.9, gx);
                if (rng() < skipGhost) {
                    let sv = bv(0.16 + rng() * 0.22, mI);
                    groove['Snare'][i] = Math.min(sv, drumVelThresholdGhost - 3);
                }
            } else if (sub === 3 && rng() < lerp(0.12, 0.45, e) * ss(0.3, 1.0, gx)) {
                // pickup ghost just before the next beat (the "a" of the triplet)
                let sv = bv(0.15 + rng() * 0.18, mI);
                groove['Snare'][i] = Math.min(sv, drumVelThresholdGhost - 3);
            } else if (sub === 1 && rng() < lerp(0.0, 0.25, e) * ss(0.5, 1.0, gx)) {
                // occasional extra ghost on busier/louder settings
                let sv = bv(0.14, mI);
                groove['Snare'][i] = Math.min(sv, drumVelThresholdGhost - 3);
            }
            // occasional accented "drag" into the backbeat at higher energy
            if (mI === 11 && e > 0.55 && rng() < 0.3) {
                groove['Snare'][i] = bv(0.45, mI);
            }

            // ---- KICK: 1 always; 3 fills in; walking doubles on the right ----
            if (mI === 0) {
                groove['Kick'][i] = bv(0.9, mI);
            } else if (mI === 8 && e > 0.3) {
                groove['Kick'][i] = bv(0.8, mI);            // beat 3
            } else if (sub === 2 && rng() < kickWalk) {
                groove['Kick'][i] = bv(0.6, mI);            // swung kick (walking shuffle)
            } else if (onBeat && rng() < kickWalk * 0.5) {
                groove['Kick'][i] = bv(0.6, mI);
            }
        }
    }

    // Cymbal lane density/dynamics as a continuous function of the knobs (METAL).
    function cymbalLane(k, mI) {
        const sub = mI % 4;
        const onBeat = sub === 0;
        const d = k.rideDensity;
        // quarter pulse always present at the beat when there's any ride density
        if (onBeat) {
            if (d < 0.2 && mI !== 0 && mI !== 8) return 0; // very sparse: only 1 & 3
            return vel(k, 0.85, mI);
        }
        // 8th-note ride layer
        if (sub === 2) {
            if (d > 0.35) return vel(k, 0.55, mI);
            return 0;
        }
        // 16th ride layer (busy ride / driving feel)
        if (d > 0.7) return vel(k, 0.32, mI);
        // sparse syncopated ride touches at the jazzy end
        if (k.gx < 0.35 && k.synco > 0.3 && rng() < k.synco * 0.25) return vel(k, 0.4, mI);
        return 0;
    }

    const seqDiv = document.getElementById('sequencer');
    function initSequencer() {
        seqDiv.innerHTML = '';
        instruments.forEach(inst => {
            const row = document.createElement('div'); row.className = 'row';
            const label = document.createElement('div'); label.className = 'row-label';
            label.innerText = inst === 'Cymbal' ? 'CY' : (inst === 'Snare' ? 'SN' : 'KD');
            row.appendChild(label);
            const stepsDiv = document.createElement('div'); stepsDiv.className = 'steps';
            for(let i=0; i<totalSteps; i++) {
                const step = document.createElement('div'); step.className = 'step'; step.id = `step-${inst}-${i}`;
                stepsDiv.appendChild(step);
            }
            row.appendChild(stepsDiv); seqDiv.appendChild(row);
        });
        generateGroove();
    }

    function updateSequencerVisuals() {
        instruments.forEach(inst => {
            for(let i=0; i<totalSteps; i++) {
                const step = document.getElementById(`step-${inst}-${i}`);
                if (step) {
                    step.classList.toggle('active', groove[inst][i] > 0);
                    step.style.opacity = groove[inst][i] > 0 ? Math.max(0.2, groove[inst][i] / 127) : 1;
                }
            }
        });
    }

    function highlightStep(stepIndex) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
        instruments.forEach(inst => {
            const el = document.getElementById(`step-${inst}-${stepIndex}`);
            if (el) el.classList.add('playing');
        });
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            let s = currentStep;
            setTimeout(() => { if (isPlaying) highlightStep(s); }, (nextNoteTime - audioCtx.currentTime) * 1000);
            instruments.forEach(inst => {
                if (groove[inst][currentStep] > 0) {
                    const v = groove[inst][currentStep];
                    const mI = currentStep % 16, sub = mI % 4;
                    const secondsPerBeat = 60.0 / bpm;
                    // ---- SWING / SHUFFLE timing ----
                    // Push the offbeat 8th (the "and", sub==2) toward the triplet point
                    // (2/3 of the beat) instead of the straight 1/2. Jazz & blues swing;
                    // metal stays straight. Also nudge the 16th "e/a" slightly for jazz.
                    let swing = 0;
                    if (currentStyle === 'jazz' || currentStyle === 'blues') {
                        const amt = (currentStyle === 'blues') ? 0.66 : 0.62; // shuffle harder
                        if (sub === 2) swing = (amt - 0.5) * secondsPerBeat;   // delay the "and"
                        else if (sub === 1) swing = (amt - 0.5) * 0.5 * secondsPerBeat;
                        else if (sub === 3) swing = (amt - 0.5) * 0.5 * secondsPerBeat;
                    }
                    // Micro-timing humanization on top of swing
                    let jitter = (Math.random() - 0.5) * 0.012;
                    if (inst === 'Snare') jitter += (v < drumVelThresholdGhost) ? 0.008 : 0.004;
                    const playAt = Math.max(audioCtx.currentTime, nextNoteTime + swing + jitter);
                    playSound(inst, v, playAt, mI);
                }
            });
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            currentStep = (currentStep + 1) % totalSteps;
        }
        timerID = setTimeout(scheduler, lookahead);
    }

    document.getElementById('playBtn').addEventListener('click', async function() {
        await initAudio();
        if (isPlaying) {
            isPlaying = false; this.innerText = "PLAY"; clearTimeout(timerID);
        } else {
            isPlaying = true; this.innerText = "STOP"; currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.05; scheduler();
        }
    });

    const stepsInput = document.getElementById('stepsInput');
    function updateSteps(newVal) {
        totalSteps = Math.max(2, Math.min(32, newVal));
        stepsInput.value = totalSteps; currentStep = 0; initSequencer();
    }
    document.getElementById('stepsMinus').onclick = () => updateSteps(totalSteps - 1);
    document.getElementById('stepsPlus').onclick = () => updateSteps(totalSteps + 1);

    const bpmInput = document.getElementById('bpmInput');
    function updateBpm(newVal) {
        bpm = Math.max(40, Math.min(300, newVal));
        bpmInput.value = bpm;
    }
    document.getElementById('bpmMinus').onclick = () => updateBpm(bpm - 1);
    document.getElementById('bpmPlus').onclick = () => updateBpm(bpm + 1);
    bpmInput.addEventListener('change', () => updateBpm(parseInt(bpmInput.value) || bpm));

    // ---- Style switcher (Metal / Jazz / Blues) ----
    const styleLabels = {
        metal: { left: 'Slow',  right: 'Fast',  top: 'Loud',   bottom: 'Sparse' },
        jazz:  { left: 'Ballad', right: 'Uptempo', top: 'Busy', bottom: 'Sparse' },
        blues: { left: 'Slow',  right: 'Fast',  top: 'Driving', bottom: 'Laid-back' },
    };
    document.querySelectorAll('.style-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentStyle = btn.dataset.style;
            const accentHex = STYLE_COLORS[currentStyle].hex;
            document.querySelectorAll('.style-btn').forEach(b => {
                const on = b === btn;
                b.style.background = on ? STYLE_COLORS[b.dataset.style].hex : '#222';
                b.style.color = on ? '#fff' : '#aaa';
            });
            applyStyleTheme();
            const L = styleLabels[currentStyle];
            document.getElementById('labelLeft').innerText = L.left;
            document.getElementById('labelRight').innerText = L.right;
            document.getElementById('labelTop').innerText = L.top;
            document.getElementById('labelBottom').innerText = L.bottom;
            // force a fresh roll for the new style
            _lastCellX = -1; _lastCellY = -1;
            generateGroove();
        });
    });

    const xyPad = document.getElementById('xyPad');
    const puck = document.getElementById('puck');
    let _lastCellX = -1, _lastCellY = -1;
    function updateXY(x, y) {
        const rect = xyPad.getBoundingClientRect();
        let px = Math.max(0, Math.min(x, rect.width));
        let py = Math.max(0, Math.min(y, rect.height));
        puck.style.left = `${px}px`; puck.style.top = `${py}px`;
        complexity = px / rect.width; loudness = 1.0 - (py / rect.height);
        // Always update puck color/labels (cheap, continuous feedback)...
        updatePuckAndLabels();
        // ...but only re-roll the groove when we enter a NEW coarse cell, so small
        // movements don't churn the pattern. (CELLS must match generateGroove.)
        const CELLS = 10;
        const cx = Math.round(complexity * CELLS), cy = Math.round(loudness * CELLS);
        if (cx !== _lastCellX || cy !== _lastCellY) {
            _lastCellX = cx; _lastCellY = cy;
            generateGroove();
        }
    }

    xyPad.addEventListener('pointerdown', (e) => { if(!tiltEnabled) updateXY(e.offsetX, e.offsetY); });
    xyPad.addEventListener('pointermove', (e) => { if(!tiltEnabled && e.buttons === 1) updateXY(e.offsetX, e.offsetY); });

    document.getElementById('tiltToggle').addEventListener('change', async (e) => {
        if (e.target.checked) {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            tiltEnabled = true; needsCalibration = true;
        } else tiltEnabled = false;
    });

    window.addEventListener('deviceorientation', (e) => {
        if (!tiltEnabled) return;
        if (needsCalibration) { baseGamma = e.gamma; baseBeta = e.beta; needsCalibration = false; }
        let xMapped = 0.5 + (((e.gamma - baseGamma) * tiltSensitivity) / 90);
        let yMapped = 0.5 - (((e.beta - baseBeta) * tiltSensitivity) / 90);
        const rect = xyPad.getBoundingClientRect();
        updateXY(Math.max(0, Math.min(1, xMapped)) * rect.width, Math.max(0, Math.min(1, yMapped)) * rect.height);
    });

    // Tap tempo
    let tapTimes = [];
    let tapTimeout;
    document.getElementById('tapBtn').addEventListener('click', () => {
        const now = performance.now();
        tapTimes.push(now);
        tapTimes = tapTimes.filter(t => now - t < 2500);
        clearTimeout(tapTimeout);
        tapTimeout = setTimeout(() => { tapTimes = []; }, 2500);
        if (tapTimes.length >= 2) {
            const intervals = [];
            for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
            const avg = intervals.reduce((a,b) => a+b) / intervals.length;
            updateBpm(Math.round(60000 / avg));
        }
    });

    document.addEventListener('keydown', async (e) => {
        if (e.target !== document.body) return;
        if (e.code === 'Space') { e.preventDefault(); document.getElementById('playBtn').click(); }
        if (e.code === 'KeyT')  { e.preventDefault(); document.getElementById('tapBtn').click(); }
    });

    initSequencer();
</script>

</body>
</html>
