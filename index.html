<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Drummer - Organic Metal Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --pad-bg: #2a2a2a;
            --accent: #e53935;
            --text-color: #888;
            --step-bg: #333;
            --step-active: #e53935;
            --step-current: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            align-items: baseline;
            gap: 10px;
            text-align: center;
        }

        .version {
            font-size: 12px;
            color: #666;
            font-weight: normal;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            gap: 8px;
            box-sizing: border-box;
            padding: 0 5px;
        }

        .main-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
            min-width: 0;
        }

        .main-btn:active { background-color: #444; }

        .param-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            padding: 8px 5px;
            border-radius: 12px;
            border: 1px solid #333;
            flex: 1;
            min-width: 0;
        }

        .param-label {
            font-size: 9px;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .param-controls {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .small-btn {
            background-color: var(--pad-bg);
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .small-btn:active { background-color: #444; }

        input[type="number"] {
            width: 40px;
            height: 26px;
            text-align: center;
            background: #1a1a1a;
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            -moz-appearance: textfield;
            padding: 0;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tilt-wrapper {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: #aaa;
            width: 100%;
        }

        .tilt-wrapper input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
        }

        .xy-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            max-width: 85vw;
            max-height: 85vw;
            margin-top: 15px;
            margin-bottom: 35px;
        }

        .label {
            position: absolute;
            font-size: 11px;
            letter-spacing: 1px;
            pointer-events: none;
            color: #999;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
        .label.top { top: -22px; left: 50%; transform: translateX(-50%); color: var(--accent); }
        .label.bottom { bottom: -22px; left: 50%; transform: translateX(-50%); }
        .label.left { left: -50px; top: 50%; transform: translateY(-50%) rotate(-90deg); width: 80px; }
        .label.right { right: -50px; top: 50%; transform: translateY(-50%) rotate(90deg); width: 80px; color: var(--accent); }

        .xy-pad {
            width: 100%;
            height: 100%;
            background-color: var(--pad-bg);
            border: 2px solid #333;
            border-radius: 20px;
            position: relative;
            touch-action: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .xy-pad::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 10% 10%; 
            pointer-events: none;
        }

        .puck {
            width: 26px;
            height: 26px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent);
            pointer-events: none;
            z-index: 2;
        }

        .sequencer {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
            box-sizing: border-box;
            padding: 0 5px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .row-label {
            width: 25px;
            font-size: 11px;
            color: #aaa;
            text-align: right;
            padding-right: 5px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .steps {
            display: flex;
            flex: 1;
            justify-content: space-between;
            width: 100%;
        }

        .step {
            flex: 1;
            height: 25px;
            background-color: var(--step-bg);
            border-radius: 3px;
            transition: background-color 0.1s, opacity 0.1s;
            margin: 0 1px;
            min-width: 2px;
        }

        .step.active {
            background-color: var(--step-active);
        }

        .step.playing {
            background-color: var(--step-current) !important;
            box-shadow: 0 0 10px #fff;
        }

        .download-btn {
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 100%;
            max-width: 390px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>Groove Generator <span class="version">v4.1 Cathartic Wall</span></h1>

    <div class="controls-row">
        <button id="playBtn" class="main-btn">PLAY</button>
        
        <div class="param-box">
            <div class="param-label">BPM</div>
            <div class="param-controls">
                <button id="bpmMinus" class="small-btn">-</button>
                <input type="number" id="bpmInput" value="140" min="40" max="300">
                <button id="bpmPlus" class="small-btn">+</button>
            </div>
        </div>

        <div class="param-box">
            <div class="param-label">STEPS</div>
            <div class="param-controls">
                <button id="stepsMinus" class="small-btn">-</button>
                <input type="number" id="stepsInput" value="16" min="2" max="32">
                <button id="stepsPlus" class="small-btn">+</button>
            </div>
        </div>
    </div>

    <div class="tilt-wrapper">
        <input type="checkbox" id="tiltToggle">
        <label for="tiltToggle">Enable Tilt Control (Flat = Center)</label>
    </div>

    <div class="xy-wrapper">
        <span class="label top">Raw</span>
        <span class="label bottom">Sparse</span>
        <span class="label left">Break / Doom</span>
        <span class="label right">Wall / Blast</span>
        <div class="xy-pad" id="xyPad">
            <div class="puck" id="puck"></div>
        </div>
    </div>

    <div class="sequencer" id="sequencer">
    </div>

    <button id="downloadMidiBtn" class="download-btn">DOWNLOAD MIDI</button>

    <script>
        let isPlaying = false;
        let bpm = 140;
        let totalSteps = 16;
        let complexity = 0.5; // X Axis
        let loudness = 0.5;   // Y Axis
        let tiltEnabled = false;
        
        let currentStep = 0;
        let nextNoteTime = 0;
        let lookahead = 25; 
        let scheduleAheadTime = 0.1; 
        let timerID;

        const instruments = ['Cymbal', 'Snare', 'Kick'];
        let groove = {
            'Cymbal': [],
            'Snare': [],
            'Kick': []
        };

        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function getCymbalType() {
            if (loudness < 0.5) return 'ClosedHH';
            if (loudness < 0.75) return 'OpenHH';
            return 'Crash'; 
        }

        function playSound(inst, velocity, time) {
            if (!audioCtx) return;
            
            let gainMultiplier = 0.4 + (loudness * 0.6); 
            const vol = (velocity / 127) * gainMultiplier;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(vol, time);
            gainNode.connect(audioCtx.destination);

            if (inst === 'Kick') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gainNode);
                osc.start(time);
                osc.stop(time + 0.2);
                
            } else if (inst === 'Snare') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, time);
                
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                noise.connect(noiseFilter);
                noiseFilter.connect(gainNode);
                
                osc.connect(gainNode);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                
                osc.start(time);
                noise.start(time);
                osc.stop(time + 0.25);
                
            } else if (inst === 'Cymbal') {
                let type = getCymbalType();
                const noise = audioCtx.createBufferSource();
                
                if (type === 'Crash') {
                    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                    noise.buffer = buffer;

                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 4000; 
                    noise.connect(filter);
                    filter.connect(gainNode);
                    
                    gainNode.gain.setValueAtTime(vol * 0.85, time); 
                    gainNode.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
                    noise.start(time);
                    
                } else {
                    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                    noise.buffer = buffer;

                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = type === 'OpenHH' ? 5000 : 7000;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    
                    let decay = type === 'OpenHH' ? 0.4 : 0.08;
                    if (type === 'OpenHH' && velocity < 85) decay = 0.08; 
                    
                    gainNode.gain.exponentialRampToValueAtTime(0.001, time + decay);
                    noise.start(time);
                }
            }
        }

        let currentSeed = 0;
        function seededRandom() {
            let x = Math.sin(currentSeed++) * 10000;
            return x - Math.floor(x);
        }

        function generateGroove() {
            for(let inst in groove) {
                if(groove[inst].length !== totalSteps) {
                    groove[inst] = new Array(totalSteps).fill(0);
                } else {
                    groove[inst].fill(0);
                }
            }

            let zoneX = Math.floor(complexity * 25);
            let zoneY = Math.floor(loudness * 25);
            currentSeed = zoneX + (zoneY * 100); 

            let drumVel = loudness >= 0.5 ? Math.floor(100 + (loudness - 0.5) * 54) : Math.floor(80 + (loudness * 40));
            let cymbalVel = Math.floor(50 + (loudness * 77)); 

            let snareGhostVel = Math.floor(drumVel * 0.25); 
            let kickGhostVel = Math.floor(drumVel * 0.55);

            let fillAmount = 0;
            if (loudness < 0.25) fillAmount = 0; 
            else if (loudness < 0.5) fillAmount = (loudness - 0.25) * 4; 
            else if (loudness < 0.75) fillAmount = 1; 
            else fillAmount = Math.max(0, 1.0 - (loudness - 0.75) * 4); 

            let isDoom = complexity < 0.25;
            let isRock = complexity >= 0.25 && complexity < 0.55;
            let isPunk = complexity >= 0.55 && complexity < 0.75;
            let isBlast = complexity >= 0.75;
            
            let isHeavyBreakdown = (isDoom && loudness >= 0.75);
            let isDeathcoreWall = (isBlast && loudness >= 0.85); // AZ ÚJ KATARTIKUS ZÓNA

            for(let i = 0; i < totalSteps; i++) {
                let kVel = 0;
                let sVel = 0;
                let cVel = 0;

                let mI = i % 16; 

                // ==========================================
                // X TENGELY (Dobok rögzítése a 16-os rácsra)
                // ==========================================
                let isSnareAnchor = false;
                let isKickAnchor = false;

                if (isHeavyBreakdown) {
                    if (mI === 8) isSnareAnchor = true; 
                    if (mI === 0) isKickAnchor = true; 
                    if (complexity >= 0.08 && mI === 2) isKickAnchor = true;
                    if (complexity >= 0.16 && mI === 14) isKickAnchor = true;
                }
                else if (isDeathcoreWall) {
                    // DEATHCORE WALL: Katartikus darálás (Mindenhol lábdob, nyolcadokon pergő)
                    isKickAnchor = true; 
                    if (mI % 2 === 0) isSnareAnchor = true;
                }
                else if (isDoom) {
                    if (mI === 8) isSnareAnchor = true;
                    if (mI === 0) isKickAnchor = true;
                } else if (isRock) {
                    if (mI === 4 || mI === 12) isSnareAnchor = true;
                    if (mI === 0 || mI === 8) isKickAnchor = true;
                } else if (isPunk) {
                    // PUNK ALAP 
                    if (mI === 2 || mI === 6 || mI === 10 || mI === 14) isSnareAnchor = true;
                    if (mI === 0 || mI === 4 || mI === 8 || mI === 12) isKickAnchor = true;
                    
                    // JAVÍTÁS: Szinkópált lábdob variációk bevezetése a Skank beat-be!
                    // D-Beat hatás
                    if (complexity >= 0.60 && (mI === 3 || mI === 11)) isKickAnchor = true;
                    // Sűrűbb galopp
                    if (complexity >= 0.68 && (mI === 7 || mI === 15)) isKickAnchor = true;
                } else {
                    if (loudness < 0.35) {
                        isSnareAnchor = true; 
                    } else {
                        if (mI % 2 !== 0) isSnareAnchor = true; 
                        if (mI % 2 === 0) isKickAnchor = true;  
                    }
                }

                if (isSnareAnchor) {
                    sVel = drumVel;
                    // Pörgetés finomítása, hogy ne legyen kása
                    if (isBlast && !isDeathcoreWall && loudness < 0.35 && mI % 2 !== 0) {
                        sVel = drumVel * 0.7; 
                    }
                }
                
                if (isKickAnchor) kVel = drumVel;

                if (!isHeavyBreakdown && !isDeathcoreWall && !isKickAnchor && !isSnareAnchor && complexity >= 0.10 && complexity < 0.75) {
                    if (mI % 2 === 0) {
                        let p8 = Math.max(0, (complexity - 0.10) * 4.0); 
                        if (seededRandom() < p8) kVel = drumVel * 0.9;
                    } 
                    else {
                        let p16 = Math.max(0, (complexity - 0.25) * 1.5);
                        if (fillAmount > 0.2 && seededRandom() < p16 * fillAmount * 0.2) {
                            kVel = kickGhostVel;
                        }
                    }
                }

                if (fillAmount > 0 && !isHeavyBreakdown && !isDeathcoreWall) {
                    if (!isSnareAnchor && kVel === 0) {
                        let xCurve = Math.max(0, 1.0 - Math.abs(complexity - 0.4) * 2.5); 
                        if (seededRandom() < fillAmount * xCurve * 0.15) sVel = snareGhostVel;
                    }
                }

                // ==========================================
                // Y TENGELY - CINTÁNYÉR DYNAMICS
                // ==========================================
                
                if (isHeavyBreakdown) {
                    if (mI === 0 || mI === 8) cVel = cymbalVel;
                    else cVel = 0; 
                }
                else if (loudness < 0.25) {
                    if (isDoom) {
                        if (mI % 4 === 0) cVel = cymbalVel * 0.8;      
                        else if (mI % 2 === 0) cVel = cymbalVel * 0.5; 
                    } else {
                        if (mI % 4 === 0 && seededRandom() < (loudness * 4 + 0.3)) cVel = cymbalVel * 0.8;
                    }
                } 
                else if (loudness < 0.5) {
                    if (isDoom) {
                        if (mI % 4 === 0) cVel = cymbalVel;
                        else if (mI % 2 === 0) cVel = cymbalVel * 0.7;
                        else if (seededRandom() < fillAmount * 0.4) cVel = cymbalVel * 0.4;
                    } else {
                        if (mI % 4 === 0) cVel = cymbalVel;
                        else if (mI % 2 === 0) cVel = cymbalVel * 0.8;
                        else if (seededRandom() < fillAmount * 0.6) cVel = cymbalVel * 0.5;
                    }
                } 
                else if (loudness < 0.75) {
                    if (mI % 4 === 0) {
                        cVel = Math.min(127, cymbalVel * 1.1);
                        
                        if (isDoom && loudness > 0.60 && (mI === 4 || mI === 12)) {
                            cVel = 0; 
                        }
                    } else {
                        let density = 0.5 + (fillAmount * 0.5); 
                        if (isDoom) density *= 0.6; 
                        
                        let distToBreakdown = 0.75 - loudness; 
                        if (distToBreakdown < 0.1) density *= (distToBreakdown * 10);

                        if (seededRandom() < density) {
                            cVel = cymbalVel * 0.35; 
                        }
                    }
                } 
                else {
                    // RAW/HATE ZÓNA
                    // JAVÍTÁS: Itt most már a Blast és Punk alatt is fixen 4 Crash van (minden negyeden), hogy keretezze a kalapálást!
                    if (mI % 4 === 0) cVel = cymbalVel; 
                }

                // Cintányér letisztítása extrém tempóknál
                if (isBlast || isDeathcoreWall) {
                    if (loudness >= 0.75) {
                        // Szigorúan 4 Crash az ütemben, a többi csend
                        if (mI % 4 !== 0) cVel = 0; 
                    } else {
                        // Tight Tension / Snare roll zóna (halkabb részek lentebb)
                        if (mI % 2 !== 0) cVel = 0; 
                    }
                }
                
                // Doom letisztítás 
                if (!isHeavyBreakdown && isDoom && loudness < 0.5 && mI % 2 !== 0) cVel = 0;

                groove['Kick'][i] = kVel;
                groove['Snare'][i] = sVel;
                groove['Cymbal'][i] = cVel;
            }

            updateSequencerVisuals();
        }

        const seqDiv = document.getElementById('sequencer');
        
        function initSequencer() {
            seqDiv.innerHTML = '';
            instruments.forEach(inst => {
                const row = document.createElement('div');
                row.className = 'row';
                
                const label = document.createElement('div');
                label.className = 'row-label';
                label.innerText = inst === 'Cymbal' ? 'CY' : (inst === 'Snare' ? 'SN' : 'KD');
                row.appendChild(label);

                const stepsDiv = document.createElement('div');
                stepsDiv.className = 'steps';
                
                for(let i=0; i<totalSteps; i++) {
                    const step = document.createElement('div');
                    step.className = 'step';
                    step.id = `step-${inst}-${i}`;
                    stepsDiv.appendChild(step);
                }
                row.appendChild(stepsDiv);
                seqDiv.appendChild(row);
            });

            generateGroove();
        }

        function updateSequencerVisuals() {
            instruments.forEach(inst => {
                for(let i=0; i<totalSteps; i++) {
                    const step = document.getElementById(`step-${inst}-${i}`);
                    if (step) {
                        if (groove[inst][i] > 0) {
                            step.classList.add('active');
                            step.style.opacity = Math.max(0.2, groove[inst][i] / 127);
                        } else {
                            step.classList.remove('active');
                            step.style.opacity = 1;
                        }
                    }
                }
            });
        }

        function highlightStep(stepIndex) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            instruments.forEach(inst => {
                const el = document.getElementById(`step-${inst}-${stepIndex}`);
                if (el) el.classList.add('playing');
            });
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            currentStep++;
            if (currentStep >= totalSteps) {
                currentStep = 0;
            }
        }

        function scheduleNote(stepNumber, time) {
            setTimeout(() => {
                if (isPlaying) highlightStep(stepNumber);
            }, (time - audioCtx.currentTime) * 1000);

            instruments.forEach(inst => {
                const vel = groove[inst][stepNumber];
                if (vel > 0) {
                    playSound(inst, vel, time);
                }
            });
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentStep, nextNoteTime);
                nextNote();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            initAudio();
            if (isPlaying) {
                isPlaying = false;
                playBtn.innerText = "PLAY";
                playBtn.style.color = "var(--accent)";
                clearTimeout(timerID);
                document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            } else {
                isPlaying = true;
                playBtn.innerText = "STOP";
                playBtn.style.color = "white";
                currentStep = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
            }
        });

        const bpmInput = document.getElementById('bpmInput');
        const btnBpmMinus = document.getElementById('bpmMinus');
        const btnBpmPlus = document.getElementById('bpmPlus');

        function updateBpm(newVal) {
            bpm = Math.max(40, Math.min(300, newVal));
            bpmInput.value = bpm;
        }

        bpmInput.addEventListener('change', (e) => updateBpm(e.target.value));
        btnBpmMinus.addEventListener('click', () => updateBpm(bpm - 5));
        btnBpmPlus.addEventListener('click', () => updateBpm(bpm + 5));

        const stepsInput = document.getElementById('stepsInput');
        const btnStepsMinus = document.getElementById('stepsMinus');
        const btnStepsPlus = document.getElementById('stepsPlus');

        function updateSteps(newVal) {
            totalSteps = Math.max(2, Math.min(32, newVal));
            stepsInput.value = totalSteps;
            
            if (currentStep >= totalSteps) {
                currentStep = 0;
            }

            initSequencer(); 
        }

        stepsInput.addEventListener('change', (e) => updateSteps(e.target.value));
        btnStepsMinus.addEventListener('click', () => updateSteps(totalSteps - 1));
        btnStepsPlus.addEventListener('click', () => updateSteps(totalSteps + 1));

        const xyPad = document.getElementById('xyPad');
        const puck = document.getElementById('puck');

        function updateXY(x, y) {
            const rect = xyPad.getBoundingClientRect();
            let px = Math.max(0, Math.min(x, rect.width));
            let py = Math.max(0, Math.min(y, rect.height));

            puck.style.left = `${px}px`;
            puck.style.top = `${py}px`;

            complexity = px / rect.width;
            loudness = 1.0 - (py / rect.height);
            
            generateGroove();
        }

        function handlePadMove(e) {
            if (tiltEnabled) return; 
            const rect = xyPad.getBoundingClientRect();
            if (e.touches) {
                e.preventDefault();
                updateXY(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            } else {
                if (e.buttons === 1) {
                    updateXY(e.clientX - rect.left, e.clientY - rect.top);
                }
            }
        }

        xyPad.addEventListener('mousedown', (e) => {
            if(!tiltEnabled) {
                const rect = xyPad.getBoundingClientRect();
                updateXY(e.clientX - rect.left, e.clientY - rect.top);
            }
        });
        xyPad.addEventListener('mousemove', handlePadMove);
        xyPad.addEventListener('touchstart', (e) => { 
            if(!tiltEnabled) {
                e.preventDefault(); 
                const rect = xyPad.getBoundingClientRect();
                updateXY(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); 
            }
        }, {passive: false});
        xyPad.addEventListener('touchmove', handlePadMove, {passive: false});

        const tiltToggle = document.getElementById('tiltToggle');

        tiltToggle.addEventListener('change', async (e) => {
            if (e.target.checked) {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            tiltEnabled = true;
                        } else {
                            alert('Gyroscopic control permission denied.');
                            e.target.checked = false;
                        }
                    } catch (error) {
                        console.error(error);
                        tiltEnabled = true; 
                    }
                } else {
                    tiltEnabled = true;
                }
            } else {
                tiltEnabled = false;
            }
        });

        window.addEventListener('deviceorientation', (e) => {
            if (!tiltEnabled) return;

            let gamma = e.gamma || 0; 
            let beta = e.beta || 0;   

            let xMapped = 0.5 + (gamma / 90);
            let yMapped = 0.5 - (beta / 90);

            xMapped = Math.max(0, Math.min(1, xMapped));
            yMapped = Math.max(0, Math.min(1, yMapped));

            const rect = xyPad.getBoundingClientRect();
            updateXY(xMapped * rect.width, yMapped * rect.height);
        });

        function toVLQ(n) {
            let buffer = [n & 0x7F];
            while ((n >>= 7)) { buffer.unshift((n & 0x7F) | 0x80); }
            return buffer;
        }

        document.getElementById('downloadMidiBtn').addEventListener('click', () => {
            const TICKS_PER_BEAT = 120;
            const TICKS_PER_16TH = TICKS_PER_BEAT / 4;
            
            let trackEvents = [];
            const microsecondsPerBeat = Math.round(60000000 / bpm);
            trackEvents.push(0x00, 0xFF, 0x51, 0x03, 
                (microsecondsPerBeat >> 16) & 0xFF, 
                (microsecondsPerBeat >> 8) & 0xFF, 
                microsecondsPerBeat & 0xFF);

            let eventsList = [];
            let cType = getCymbalType();

            for (let step = 0; step < totalSteps; step++) {
                instruments.forEach(inst => {
                    const vel = groove[inst][step];
                    if (vel > 0) {
                        let note = 36; 
                        if (inst === 'Snare') note = 38;
                        if (inst === 'Cymbal') {
                            if (cType === 'Crash') note = 49;
                            else if (cType === 'OpenHH') {
                                note = vel < 85 ? 42 : 46; 
                            }
                            else note = 42; 
                        }
                        
                        eventsList.push({ step: step, type: 0x99, note: note, vel: vel });
                        eventsList.push({ step: step + 0.9, type: 0x89, note: note, vel: 0 });
                    }
                });
            }

            eventsList.sort((a, b) => a.step - b.step);

            let lastAbsoluteTick = 0;
            eventsList.forEach(ev => {
                let absoluteTick = Math.round(ev.step * TICKS_PER_16TH);
                let deltaTick = absoluteTick - lastAbsoluteTick;
                
                trackEvents.push(...toVLQ(deltaTick));
                trackEvents.push(ev.type, ev.note, ev.vel);

                lastAbsoluteTick = absoluteTick;
            });

            trackEvents.push(0x00, 0xFF, 0x2F, 0x00);

            const trackLen = trackEvents.length;
            const trackHeader = [
                0x4D, 0x54, 0x72, 0x6B,
                (trackLen >> 24) & 0xFF, (trackLen >> 16) & 0xFF, (trackLen >> 8) & 0xFF, trackLen & 0xFF
            ];

            const header = [
                0x4D, 0x54, 0x68, 0x64,
                0x00, 0x00, 0x00, 0x06,
                0x00, 0x00,
                0x00, 0x01,
                (TICKS_PER_BEAT >> 8) & 0xFF, TICKS_PER_BEAT & 0xFF
            ];

            const midiBytes = new Uint8Array([...header, ...trackHeader, ...trackEvents]);
            
            const blob = new Blob([midiBytes], { type: 'audio/midi' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `organic_metal_${bpm}bpm_${totalSteps}steps.mid`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        });

        initSequencer(); 
        
        setTimeout(() => {
            const rect = xyPad.getBoundingClientRect();
            // Start right at the Deathcore Wall to show it off
            updateXY(rect.width * 1.0, rect.height * 0.0); 
        }, 100);

    </script>
</body>
