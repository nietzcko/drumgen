<div class="controls-row">

            </div>
        </div>
    </div>
</div>

<div class="xy-wrapper">
    <span class="label top" id="labelTop">Hate</span>
    <span class="label bottom" id="labelBottom">Void</span>
    <span class="label left" id="labelLeft">Doom</span>
    <span class="label right" id="labelRight">Blast</span>
    <div class="xy-pad" id="xyPad">
        <div class="puck" id="puck"></div>
    </div>
</div>

</div>

<div class="tilt-wrapper">
    <input type="checkbox" id="tiltToggle">
    <label for="tiltToggle">Tilt Control (experimental, calibrates on check)</label>
</div>

<div class="wav-status" id="wavStatus">
    <div class="wav-status-title">SAMPLES</div>
    <div id="wavList"></div>
</div>

<button id="downloadMidiBtn" class="download-btn">DOWNLOAD MIDI</button>

<script>
    let isPlaying = false;
    let bpm = 140;
    let totalSteps = 16;
    let complexity = 0.5; // X Axis (Doom -> Blast)
    let loudness = 0.5;   // Y Axis (Void -> Hate)
    
    let tiltEnabled = false;
    let needsCalibration = false;
    let baseGamma = 0;
    let baseBeta = 0;
    const tiltSensitivity = 2.5; 
    
    let currentStep = 0;
    let nextNoteTime = 0;
    let lookahead = 25; 
    let scheduleAheadTime = 0.1; 
    let timerID;

    const instruments = ['Cymbal', 'Snare', 'Kick'];
    let groove = { 'Cymbal': [], 'Snare': [], 'Kick': [] };

    let audioCtx;
    const wavBuffers = {};
    const wavFiles = {
        'kick':         'kick.wav',
        'snare':        'snare.wav',
        'snare_ghost':  'snare_ghost.wav',
        'hihat_closed': 'hihat_closed.wav',
        'hihat_open':   'hihat_open.wav',
        'crash':        'crash.wav',
    };

    function updateWavStatusUI() {
        const list = document.getElementById('wavList');
        if (!list) return;
        const labels = {
            'kick': 'kick.wav', 'snare': 'snare.wav', 'snare_ghost': 'snare_ghost.wav',
            'hihat_closed': 'hihat_closed.wav', 'hihat_open': 'hihat_open.wav', 'crash': 'crash.wav'
        };
        const descriptions = {
            'kick': 'Kick drum', 'snare': 'Snare', 'snare_ghost': 'Snare ghost (optional)',
            'hihat_closed': 'Closed hi-hat', 'hihat_open': 'Open hi-hat', 'crash': 'Crash cymbal'
        };
        list.innerHTML = Object.entries(labels).map(([key, file]) => {
            const loaded = !!wavBuffers[key];
            return `<div class="wav-item">
                <span class="filename">${file}</span>
                <span class="${loaded ? 'wav-ok' : 'wav-missing'}">${loaded ? '✓ loaded' : descriptions[key] === 'Snare ghost (optional)' ? '— synthesized' : '— synthesized'}</span>
            </div>`;
        }).join('');
    }

    async function loadWavBuffers() {
        for (const [key, file] of Object.entries(wavFiles)) {
            try {
                const res = await fetch(file);
                if (!res.ok) continue;
                const arrayBuf = await res.arrayBuffer();
                wavBuffers[key] = await audioCtx.decodeAudioData(arrayBuf);
            } catch(e) {
                // file not found or decode error - fall back to synth
            }
        }
        updateWavStatusUI();
    }

    // Show default state on load
    window.addEventListener('DOMContentLoaded', () => updateWavStatusUI());

    function playWav(key, vol, time) {
        if (!wavBuffers[key]) return false;
        const src = audioCtx.createBufferSource();
        src.buffer = wavBuffers[key];
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(Math.min(1, vol), time);
        src.connect(gain);
        gain.connect(audioCtx.destination);
        src.start(time);
        return true;
    }

    async function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            await loadWavBuffers();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // FIX 3: Update puck color and label colors based on proximity to axes
    function updatePuckAndLabels() {
        const puck = document.getElementById('puck');
        const labelTop = document.getElementById('labelTop');
        const labelBottom = document.getElementById('labelBottom');
        const labelLeft = document.getElementById('labelLeft');
        const labelRight = document.getElementById('labelRight');

        // loudness = Y (0=bottom/Void, 1=top/Hate)
        // complexity = X (0=left/Doom, 1=right/Blast)
        const distTop    = 1.0 - loudness;   // distance from Hate (top)
        const distBottom = loudness;           // distance from Void (bottom)
        const distLeft   = complexity;         // distance from Doom (left)
        const distRight  = 1.0 - complexity;  // distance from Blast (right)

        const minDist = Math.min(distTop, distBottom, distLeft, distRight);

        // Puck color: lerp from grey (#666) to red (#e53935) based on proximity
        // proximity = 1 when minDist=0, 0 when minDist>=0.5
        const proximity = Math.max(0, 1 - minDist * 2);
        const r = Math.round(102 + (229 - 102) * proximity);
        const g = Math.round(102 + (57  - 102) * proximity);
        const b = Math.round(102 + (53  - 102) * proximity);
        const color = `rgb(${r},${g},${b})`;
        puck.style.backgroundColor = color;
        puck.style.boxShadow = proximity > 0.1 ? `0 0 ${8 + proximity * 12}px ${color}` : 'none';

        // Label colors: each label gets red when its axis is close, grey otherwise
        function labelColor(dist) {
            const p = Math.max(0, 1 - dist * 2);
            const lr = Math.round(102 + (229 - 102) * p);
            const lg = Math.round(102 + (57  - 102) * p);
            const lb = Math.round(102 + (53  - 102) * p);
            return `rgb(${lr},${lg},${lb})`;
        }
        labelTop.style.color    = labelColor(distTop);
        labelBottom.style.color = labelColor(distBottom);
        labelLeft.style.color   = labelColor(distLeft);
        labelRight.style.color  = labelColor(distRight);
    }

    function getCymbalType(mI) {
        // Metal cymbal voicing by loudness:
        //  low      : tight closed hat (gallop riding)
        //  mid      : RIDE with BELL accents on the beat (the metal staple)
        //  high     : crash/china on downbeats, ride bell between — not wall-to-wall
        if (loudness < 0.42) {
            return 'ClosedHH';
        } else if (loudness < 0.66) {
            // ride: bell (accent) on quarters, bow elsewhere -> use OpenHH as "ride bell"
            return (mI % 4 === 0) ? 'OpenHH' : 'ClosedHH';
        } else if (loudness < 0.85) {
            if (mI % 4 === 0) return 'Crash';   // crash/china on each beat
            return 'OpenHH';                     // ride between
        } else {
            // top end: crash on the beat, ride bell on the offbeats (controlled wall)
            return (mI % 2 === 0) ? 'Crash' : 'OpenHH';
        }
    }

    function playSoundSynth(inst, velocity, time, mI) {
        // Fallback szintetizált hangok ha nincs WAV
        const gainMultiplier = 0.4 + (loudness * 0.6);
        const vol = (velocity / 127) * gainMultiplier;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(vol, time);
        gainNode.connect(audioCtx.destination);

        if (inst === 'Kick') {
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(250, time);
            osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.2);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
            osc.connect(gainNode);
            osc.start(time); osc.stop(time + 0.2);
        } else if (inst === 'Snare') {
            const osc = audioCtx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, time);
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.value = 1000;
            noise.connect(noiseFilter); noiseFilter.connect(gainNode); osc.connect(gainNode);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
            osc.start(time); noise.start(time); osc.stop(time + 0.25);
        } else if (inst === 'Cymbal') {
            let type = getCymbalType(mI || 0);
            const noise = audioCtx.createBufferSource();
            if (type === 'Crash') {
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = 4000;
                noise.connect(filter); filter.connect(gainNode);
                gainNode.gain.setValueAtTime(vol * 0.85, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
                noise.start(time);
            } else {
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = type === 'OpenHH' ? 5000 : 7000;
                noise.connect(filter); filter.connect(gainNode);
                let decay = (type === 'OpenHH' && velocity < 85) ? 0.08 : (type === 'OpenHH' ? 0.4 : 0.08);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + decay);
                noise.start(time);
            }
        }
    }

    function playSound(inst, velocity, time, mI) {
        if (!audioCtx) return;
        const gainMultiplier = 0.4 + (loudness * 0.6);
        const vol = (velocity / 127) * gainMultiplier;
        const isGhost = velocity < drumVelThresholdGhost;

        if (inst === 'Kick') {
            if (!playWav('kick', vol, time)) playSoundSynth(inst, velocity, time, mI);
        } else if (inst === 'Snare') {
            if (isGhost) {
                if (!playWav('snare_ghost', vol, time)) playWav('snare', vol * 0.4, time) || playSoundSynth(inst, velocity, time, mI);
            } else {
                if (!playWav('snare', vol, time)) playSoundSynth(inst, velocity, time, mI);
            }
        } else if (inst === 'Cymbal') {
            const type = getCymbalType(mI || 0);
            if (type === 'Crash') {
                if (!playWav('crash', vol, time)) playSoundSynth(inst, velocity, time, mI);
            } else if (type === 'OpenHH') {
                if (!playWav('hihat_open', vol, time)) playSoundSynth(inst, velocity, time, mI);
            } else {
                if (!playWav('hihat_closed', vol, time)) playSoundSynth(inst, velocity, time, mI);
            }
        }
    }

    // Ghost velocity threshold (snare velocity alatt ez) - drumVel 30%-a
    let drumVelThreshold = 40;

    // Ghost velocity threshold (below this = ghost snare sample)
    let drumVelThresholdGhost = 45;

    // ---- Proper PRNG (mulberry32): uniform, deterministic, no Math.sin clumping ----
    let _rngState = 0;
    function seedRng(s) { _rngState = (s >>> 0) || 1; }
    function rng() {
        _rngState |= 0; _rngState = (_rngState + 0x6D2B79F5) | 0;
        let t = Math.imul(_rngState ^ (_rngState >>> 15), 1 | _rngState);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    function chance(p) { return rng() < p; }
    // back-compat alias
    function seededRandom() { return rng(); }

    /*
       GROOVE ENGINE v7
       ----------------
       Patterns are stored as ONE-BAR (16th) skeletons per zone, expressed as
       musical events rather than blind per-step toggles. A skeleton defines:
         k: kick step indices, s: backbeat snare step indices,
         g: candidate ghost-snare steps, feel: 'straight'|'swing'
       generateGroove() lays the skeleton across the whole sequence bar-by-bar,
       humanizes velocity + adds an accent structure, sprinkles ghosts by
       probability, and replaces the final bar of a 2-bar phrase with a fill.
       Cymbal lane carries hi-hat / ride / crash density driven by loudness.
    */

    // Pick a value from an array using the seeded rng
    function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }

    // ---- DOUBLE-BASS FIGURE LIBRARY ----
    // Real metal double-bass is phrased, not a flat 16th drone. Each figure is a
    // one-bar set of kick step indices that LOCKS with the backbeat (it leaves
    // room around beats 2 & 4, or deliberately plays through them for intensity).
    // Figures are grouped by intensity tier; we pick within a tier with the RNG
    // so adjacent pad cells give variation instead of the same drone.
    const DBASS_FIGURES = {
        // tier 1: gallops & half-feel — feet phrase in 3s/2s, backbeat stays clear
        light: [
            [0, 3, 4, 7, 8, 11, 12, 15],        // straight gallop: beat + "a"
            [0, 1, 4, 5, 8, 9, 12, 13],         // reverse gallop: beat + "e"
            [0, 2, 3, 8, 10, 11],               // burst-rest-burst (two-bar feel)
            [0, 3, 6, 8, 11, 14],               // dotted / swung doubles
        ],
        // tier 2: driving 16ths with gaps that breathe around the snare
        mid: [
            [0, 1, 2, 4, 5, 6, 8, 9, 10, 12, 13, 14],  // 3-note bursts off each beat
            [0, 2, 3, 4, 6, 7, 8, 10, 11, 12, 14, 15],  // skip-step stutter
            [0, 1, 2, 8, 9, 10, 4, 6, 12, 14],          // bursts on 1&3, doubles on 2&4
            [0, 3, 4, 5, 7, 8, 11, 12, 13, 15],         // syncopated gallop chain
        ],
        // tier 3: relentless but still phrased — accented groupings, not pure drone
        heavy: [
            [0,1,2,3, 6,7, 8,9,10,11, 14,15],     // 4-group / 2-group alternation
            [0,1,2, 4,5,6, 8,9,10, 12,13,14],      // groups of 3 (triplet-feel over 16ths)
            [0,1,2,3,4,5,6,7, 10,11, 14,15],       // run then stutter
            [0,1,3,4, 6,7,8,9, 11,12, 14,15],      // displaced groupings
        ],
    };

    // Build the kick skeleton for a zone, scaled by intra-zone position (0..1).
    // METAL: loudness (Y) drives a RHYTHMIC double-bass figure on top of the
    // zone's base groove — not a flat 16th wall.
    function kickPattern(zone, pos, bar) {
        let k;
        if (zone === 'doom') {
            // Sparse, heavy base. Beat 1 always; fill in as pos grows.
            k = [0];
            if (pos >= 0.30) k.push(8);
            if (pos >= 0.55) k.push(10);
            if (pos >= 0.80) k.push(14);
        } else if (zone === 'rock') {
            // Mid-tempo metal: syncopated kick under the backbeat.
            const sets = [
                [0, 8],
                [0, 6, 8],
                [0, 3, 8, 10],
                [0, 6, 8, 11, 14],
            ];
            k = sets[Math.min(sets.length - 1, Math.floor(pos * sets.length))].slice();
        } else if (zone === 'punk') {
            // D-beat / thrash drive: steady 8ths, denser to the right.
            const sets = [
                [0, 4, 8, 12],
                [0, 3, 4, 8, 11, 12],
                [0, 2, 4, 8, 10, 12],
                [0, 2, 4, 6, 8, 10, 12, 14],
            ];
            k = sets[Math.min(sets.length - 1, Math.floor(pos * sets.length))].slice();
        } else {
            // blast base
            k = [0, 4, 8, 12];
        }

        // ---- RHYTHMIC DOUBLE-BASS LAYER ----
        // Choose a figure tier from loudness, then pick a specific figure with the
        // RNG. Re-pick per bar (offset the rng by bar) so two-bar phrases breathe.
        let tier = null;
        if      (loudness >= 0.55 && loudness < 0.72) tier = 'light';
        else if (loudness >= 0.72 && loudness < 0.86) tier = 'mid';
        else if (loudness >= 0.86)                    tier = 'heavy';

        if (tier) {
            const figs = DBASS_FIGURES[tier];
            // bar-dependent pick: vary the figure across the phrase but stay coherent
            const fig = figs[Math.floor(rng() * figs.length)];
            // doom keeps it more reserved — only merge a sparser slice of the figure
            if (zone === 'doom') {
                fig.forEach(s => { if (s % 2 === 0 || rng() < 0.4) k.push(s); });
            } else {
                fig.forEach(s => k.push(s));
            }
        }
        return [...new Set(k)].sort((a, b) => a - b);
    }

    // Snare backbeat per zone
    function snarePattern(zone) {
        if (zone === 'doom') return [8];            // half-time, beat 3
        if (zone === 'rock') return [4, 12];        // 2 and 4
        if (zone === 'punk') return [4, 12];        // 2 and 4 (d-beat backbeat)
        // blast: snare alternates with kick on the offbeat 16ths (handled specially)
        return [2, 6, 10, 14];
    }

    // Candidate ghost-note steps (will be gated by probability)
    function ghostCandidates(zone) {
        if (zone === 'doom') return [11, 14];
        if (zone === 'rock') return [3, 7, 10, 11, 15];
        if (zone === 'punk') return [2, 6, 10, 14];
        return [2, 6, 10, 14];
    }

    // A small library of one-bar fills (snare/tom-style bursts) for phrase ends.
    // Represented on the snare lane as accented 16ths leading to the downbeat.
    function pickFill(zone, intensity) {
        const fills = [
            [12, 13, 14, 15],
            [10, 11, 12, 13, 14, 15],
            [8, 10, 12, 13, 14, 15],
            [12, 14, 15],
            [11, 13, 14, 15],
        ];
        // heavier zones / louder => busier fill
        const bias = Math.min(fills.length - 1, Math.floor(intensity * fills.length));
        // still allow some variety around the bias
        const lo = Math.max(0, bias - 1);
        const choice = lo + Math.floor(rng() * (fills.length - lo));
        return fills[Math.min(fills.length - 1, choice)];
    }

    // Humanize a base velocity: accent on downbeats, slight random drift.
    function humanize(base, stepInBar, isAccent) {
        let v = base;
        if (isAccent) v += 8;
        // beat-position accenting: beats (0,4,8,12) loudest, offbeats softer
        const sub = stepInBar % 4;
        if (sub === 0) v += 6;
        else if (sub === 2) v += 2;
        else v -= 4;
        // random drift ±6 for human feel
        v += Math.floor((rng() - 0.5) * 12);
        return Math.max(1, Math.min(127, Math.round(v)));
    }

    function generateGroove() {
        for (let inst in groove) groove[inst] = new Array(totalSteps).fill(0);

        // Deterministic per XY cell, but fine-grained enough to vary across the pad
        let zoneX = Math.floor(complexity * 40);
        let zoneY = Math.floor(loudness * 40);
        seedRng(zoneX * 131 + zoneY * 977 + 17);

        // Zone boundaries (kept conceptually; tuned for musicality)
        let zone, pos;
        if (complexity < 0.18) { zone = 'doom';  pos = complexity / 0.18; }
        else if (complexity < 0.52) { zone = 'rock';  pos = (complexity - 0.18) / 0.34; }
        else if (complexity < 0.88) { zone = 'punk';  pos = (complexity - 0.52) / 0.36; }
        else { zone = 'blast'; pos = (complexity - 0.88) / 0.12; }

        // Base velocities driven by loudness (Y axis)
        const kickBase  = Math.round(70 + loudness * 50);
        const snareBase = Math.round(72 + loudness * 50);
        const ghostBase = Math.round(22 + loudness * 18);
        const cymBase   = Math.round(60 + loudness * 45);

        const snares = snarePattern(zone);
        const ghosts = ghostCandidates(zone);
        // ghost density rises with loudness and intra-zone position
        const ghostProb = 0.12 + loudness * 0.30 + pos * 0.18;

        const bars = Math.ceil(totalSteps / 16);
        // A true blast beat at high intensity: kick and snare alternate on 16ths.
        const isTrueBlast = (zone === 'blast') && (loudness >= 0.5);

        for (let bar = 0; bar < bars; bar++) {
            const barStart = bar * 16;
            // Last bar of every 2-bar phrase becomes a fill (only if there's room)
            const isFillBar = (bars > 1) && (bar % 2 === 1) && (barStart + 8 < totalSteps);
            const fillSteps = isFillBar ? pickFill(zone, (pos + loudness) / 2) : null;
            // Fresh double-bass figure each bar so the phrase breathes & varies
            const kicks = kickPattern(zone, pos, bar);

            for (let mI = 0; mI < 16; mI++) {
                const i = barStart + mI;
                if (i >= totalSteps) break;

                // ===== TRUE BLAST BEAT: alternating kick(even)/snare(odd) 16ths =====
                if (isTrueBlast && !isFillBar) {
                    if (mI % 2 === 0) {
                        groove['Kick'][i] = humanize(kickBase, mI, mI === 0);
                    } else {
                        groove['Snare'][i] = humanize(snareBase - 6, mI, false);
                    }
                    groove['Cymbal'][i] = cymbalVelocity(zone, mI, i, cymBase, false);
                    continue;
                }

                // ---- KICK ----
                if (kicks.includes(mI)) {
                    // suppress kicks under a busy fill so the fill reads clearly
                    if (!(isFillBar && fillSteps.includes(mI) && mI >= 8)) {
                        const onBeat = (mI % 4 === 0);
                        // Rhythmic contour: beats punch, in-between doubles sit back.
                        // This is what makes double-bass sound PHRASED, not a flat drone.
                        const kv = onBeat ? kickBase : Math.round(kickBase * 0.78);
                        groove['Kick'][i] = humanize(kv, mI, mI === 0);
                    }
                }

                // ---- SNARE (backbeat + ghosts, or tom-led fill) ----
                if (isFillBar && fillSteps.includes(mI)) {
                    // tom-led fill: crescendo toward the downbeat, kick reinforces
                    // the front of the fill (mimics floor-tom + kick) then snare on top
                    const prog = (mI - fillSteps[0]) / Math.max(1, (15 - fillSteps[0]));
                    groove['Snare'][i] = humanize(Math.round(72 + prog * 45), mI, true);
                    // reinforce with kick on the first half of the fill for weight
                    if (mI < 14 && (mI % 2 === 0)) {
                        groove['Kick'][i] = humanize(kickBase - 4, mI, false);
                    }
                } else if (snares.includes(mI)) {
                    groove['Snare'][i] = humanize(snareBase, mI, true);
                } else if (ghosts.includes(mI) && chance(ghostProb)) {
                    groove['Snare'][i] = Math.max(1, Math.min(60, humanize(ghostBase, mI, false)));
                }

                // ---- CYMBAL ----
                groove['Cymbal'][i] = cymbalVelocity(zone, mI, i, cymBase, isFillBar);
            }
        }

        // Crash on the very first downbeat when it's loud (the "1" accent)
        if (loudness >= 0.55 && totalSteps > 0) {
            groove['Cymbal'][0] = Math.min(127, cymBase + 30);
        }
        // Crash resolves each fill: land a crash on the downbeat AFTER a fill bar
        for (let bar = 1; bar < bars; bar++) {
            const isFillBar = (bars > 1) && (bar % 2 === 1) && (bar * 16 + 8 < totalSteps);
            if (isFillBar) {
                const resolve = (bar + 1) * 16; // downbeat of the next bar
                if (resolve < totalSteps) {
                    groove['Cymbal'][resolve] = Math.min(127, cymBase + 30);
                    if (groove['Kick'][resolve] === 0) groove['Kick'][resolve] = humanize(kickBase, 0, true);
                }
            }
        }

        updateSequencerVisuals();
        updatePuckAndLabels();
    }

    // Cymbal density/dynamics: hat pulse at low loudness, ride/crash as it climbs.
    function cymbalVelocity(zone, mI, i, base, isFillBar) {
        // During a fill, thin out the cymbal so the fill cuts through
        if (isFillBar && (mI % 4 !== 0)) return 0;

        const sub = mI % 4;
        if (zone === 'doom') {
            if (loudness < 0.30) return sub === 0 ? base : 0;          // quarters
            if (loudness < 0.60) return (mI % 2 === 0) ? (sub === 0 ? base : Math.round(base * 0.6)) : 0; // 8ths
            // 16ths with accents
            if (sub === 0) return base;
            if (sub === 2) return Math.round(base * 0.6);
            return chance(0.5) ? Math.round(base * 0.35) : 0;
        }
        if (zone === 'blast') {
            // ride/crash steady 8ths so it cuts over the kick-snare barrage,
            // hard bell accent on every beat
            if (sub === 0) return Math.min(127, base + 10);
            if (mI % 2 === 0) return Math.round(base * 0.7);
            return 0;
        }
        // rock / punk
        if (loudness < 0.40) {
            // 8th-note hat pulse
            return (mI % 2 === 0) ? (sub === 0 ? base : Math.round(base * 0.7)) : 0;
        }
        if (loudness < 0.72) {
            // ride 8ths with bell accent on the beat (classic metal ride)
            if (sub === 0) return Math.min(127, base + 8);
            if (mI % 2 === 0) return Math.round(base * 0.6);
            return 0;
        }
        // high loudness: keep riding 8ths so it doesn't mud up the 16th double-bass
        if (sub === 0) return Math.min(127, base + 10);
        if (mI % 2 === 0) return Math.round(base * 0.65);
        return 0;
    }

    const seqDiv = document.getElementById('sequencer');
    function initSequencer() {
        seqDiv.innerHTML = '';
        instruments.forEach(inst => {
            const row = document.createElement('div'); row.className = 'row';
            const label = document.createElement('div'); label.className = 'row-label';
            label.innerText = inst === 'Cymbal' ? 'CY' : (inst === 'Snare' ? 'SN' : 'KD');
            row.appendChild(label);
            const stepsDiv = document.createElement('div'); stepsDiv.className = 'steps';
            for(let i=0; i<totalSteps; i++) {
                const step = document.createElement('div'); step.className = 'step'; step.id = `step-${inst}-${i}`;
                stepsDiv.appendChild(step);
            }
            row.appendChild(stepsDiv); seqDiv.appendChild(row);
        });
        generateGroove();
    }

    function updateSequencerVisuals() {
        instruments.forEach(inst => {
            for(let i=0; i<totalSteps; i++) {
                const step = document.getElementById(`step-${inst}-${i}`);
                if (step) {
                    step.classList.toggle('active', groove[inst][i] > 0);
                    step.style.opacity = groove[inst][i] > 0 ? Math.max(0.2, groove[inst][i] / 127) : 1;
                }
            }
        });
    }

    function highlightStep(stepIndex) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
        instruments.forEach(inst => {
            const el = document.getElementById(`step-${inst}-${stepIndex}`);
            if (el) el.classList.add('playing');
        });
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            let s = currentStep;
            setTimeout(() => { if (isPlaying) highlightStep(s); }, (nextNoteTime - audioCtx.currentTime) * 1000);
            instruments.forEach(inst => {
                if (groove[inst][currentStep] > 0) {
                    const v = groove[inst][currentStep];
                    // Micro-timing: tiny per-hit offset so it breathes (not quantized-stiff).
                    // Snare backbeat sits a hair behind; ghosts loosest; kick tightest.
                    const secPerStep = 0.25 * (60.0 / bpm);
                    let jitter = (Math.random() - 0.5) * 0.012; // ±6ms human drift
                    if (inst === 'Snare') jitter += (v < drumVelThresholdGhost) ? 0.008 : 0.004;
                    const playAt = Math.max(audioCtx.currentTime, nextNoteTime + jitter);
                    playSound(inst, v, playAt, currentStep % 16);
                }
            });
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat;
            currentStep = (currentStep + 1) % totalSteps;
        }
        timerID = setTimeout(scheduler, lookahead);
    }

    document.getElementById('playBtn').addEventListener('click', async function() {
        await initAudio();
        if (isPlaying) {
            isPlaying = false; this.innerText = "PLAY"; clearTimeout(timerID);
        } else {
            isPlaying = true; this.innerText = "STOP"; currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.05; scheduler();
        }
    });

    const stepsInput = document.getElementById('stepsInput');
    function updateSteps(newVal) {
        totalSteps = Math.max(2, Math.min(32, newVal));
        stepsInput.value = totalSteps; currentStep = 0; initSequencer();
    }
    document.getElementById('stepsMinus').onclick = () => updateSteps(totalSteps - 1);
    document.getElementById('stepsPlus').onclick = () => updateSteps(totalSteps + 1);

    const bpmInput = document.getElementById('bpmInput');
    function updateBpm(newVal) {
        bpm = Math.max(40, Math.min(300, newVal));
        bpmInput.value = bpm;
    }
    document.getElementById('bpmMinus').onclick = () => updateBpm(bpm - 1);
    document.getElementById('bpmPlus').onclick = () => updateBpm(bpm + 1);
    bpmInput.addEventListener('change', () => updateBpm(parseInt(bpmInput.value) || bpm));

    const xyPad = document.getElementById('xyPad');
    const puck = document.getElementById('puck');
    function updateXY(x, y) {
        const rect = xyPad.getBoundingClientRect();
        let px = Math.max(0, Math.min(x, rect.width));
        let py = Math.max(0, Math.min(y, rect.height));
        puck.style.left = `${px}px`; puck.style.top = `${py}px`;
        complexity = px / rect.width; loudness = 1.0 - (py / rect.height);
        generateGroove();
    }

    xyPad.addEventListener('pointerdown', (e) => { if(!tiltEnabled) updateXY(e.offsetX, e.offsetY); });
    xyPad.addEventListener('pointermove', (e) => { if(!tiltEnabled && e.buttons === 1) updateXY(e.offsetX, e.offsetY); });

    document.getElementById('tiltToggle').addEventListener('change', async (e) => {
        if (e.target.checked) {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            tiltEnabled = true; needsCalibration = true;
        } else tiltEnabled = false;
    });

    window.addEventListener('deviceorientation', (e) => {
        if (!tiltEnabled) return;
        if (needsCalibration) { baseGamma = e.gamma; baseBeta = e.beta; needsCalibration = false; }
        let xMapped = 0.5 + (((e.gamma - baseGamma) * tiltSensitivity) / 90);
        let yMapped = 0.5 - (((e.beta - baseBeta) * tiltSensitivity) / 90);
        const rect = xyPad.getBoundingClientRect();
        updateXY(Math.max(0, Math.min(1, xMapped)) * rect.width, Math.max(0, Math.min(1, yMapped)) * rect.height);
    });

    // Tap tempo
    let tapTimes = [];
    let tapTimeout;
    document.getElementById('tapBtn').addEventListener('click', () => {
        const now = performance.now();
        tapTimes.push(now);
        tapTimes = tapTimes.filter(t => now - t < 2500);
        clearTimeout(tapTimeout);
        tapTimeout = setTimeout(() => { tapTimes = []; }, 2500);
        if (tapTimes.length >= 2) {
            const intervals = [];
            for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
            const avg = intervals.reduce((a,b) => a+b) / intervals.length;
            updateBpm(Math.round(60000 / avg));
        }
    });

    document.addEventListener('keydown', async (e) => {
        if (e.target !== document.body) return;
        if (e.code === 'Space') { e.preventDefault(); document.getElementById('playBtn').click(); }
        if (e.code === 'KeyT')  { e.preventDefault(); document.getElementById('tapBtn').click(); }
    });

    initSequencer();
</script>
