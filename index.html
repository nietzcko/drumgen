<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Drummer - Organic Metal Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --pad-bg: #2a2a2a;
            --accent: #e53935;
            --text-color: #888;
            --step-bg: #333;
            --step-active: #e53935;
            --step-current: #fff;
            --label-dim: #444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            box-sizing: border-box;
        }

        h1 { color: var(--accent); font-size: 20px; margin-bottom: 10px; font-weight: 500; text-align: center; }
        .version { font-size: 12px; color: #666; font-weight: normal; }

        .controls-row { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 20px; gap: 8px; }
        .main-btn { background-color: var(--pad-bg); color: var(--accent); border: 1px solid #444; padding: 10px 15px; border-radius: 12px; font-size: 16px; font-weight: bold; text-transform: uppercase; flex: 1; }
        .param-box { display: flex; flex-direction: column; align-items: center; background-color: #222; padding: 8px 5px; border-radius: 12px; border: 1px solid #333; flex: 1; }
        .param-label { font-size: 9px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        .small-btn { background-color: var(--pad-bg); color: var(--accent); border: 1px solid #444; border-radius: 6px; width: 28px; height: 28px; font-size: 16px; display: flex; justify-content: center; align-items: center; }
        input[type="number"] { width: 40px; height: 26px; text-align: center; background: #1a1a1a; color: var(--accent); border: 1px solid #444; border-radius: 6px; font-size: 14px; }

        .tilt-wrapper { margin-bottom: 20px; font-size: 14px; color: #aaa; }

        .xy-wrapper { position: relative; width: 300px; height: 300px; max-width: 85vw; max-height: 85vw; margin-top: 15px; margin-bottom: 35px; }
        .label { position: absolute; font-size: 14px; letter-spacing: 2px; pointer-events: none; color: var(--label-dim); text-align: center; font-weight: 900; text-transform: uppercase; transition: color 0.1s ease, text-shadow 0.1s ease; }
        .label.top { top: -25px; left: 50%; transform: translateX(-50%); }
        .label.bottom { bottom: -25px; left: 50%; transform: translateX(-50%); }
        .label.left { left: -60px; top: 50%; transform: translateY(-50%) rotate(-90deg); width: 80px; }
        .label.right { right: -60px; top: 50%; transform: translateY(-50%) rotate(90deg); width: 80px; }

        .xy-pad { width: 100%; height: 100%; background-color: var(--pad-bg); border: 2px solid #333; border-radius: 20px; position: relative; touch-action: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        .puck { width: 26px; height: 26px; background-color: var(--accent); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--accent); pointer-events: none; z-index: 2; }

        .sequencer { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .row { display: flex; align-items: center; width: 100%; }
        .row-label { width: 25px; font-size: 11px; color: #aaa; text-align: right; padding-right: 5px; font-weight: bold; }
        .steps { display: flex; flex: 1; justify-content: space-between; }
        .step { flex: 1; height: 25px; background-color: var(--step-bg); border-radius: 3px; margin: 0 1px; transition: opacity 0.1s; }
        .step.active { background-color: var(--step-active); }
        .step.playing { background-color: var(--step-current) !important; box-shadow: 0 0 10px #fff; }

        .download-btn { background-color: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; max-width: 390px; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1>Metal Engine <span class="version">v4.6 Corner Pressure</span></h1>

    <div class="controls-row">
        <button id="playBtn" class="main-btn">PLAY</button>
        <div class="param-box">
            <div class="param-label">BPM</div>
            <div class="param-controls" style="display:flex; align-items:center; gap:3px;">
                <button id="bpmMinus" class="small-btn">-</button>
                <input type="number" id="bpmInput" value="140">
                <button id="bpmPlus" class="small-btn">+</button>
            </div>
        </div>
        <div class="param-box">
            <div class="param-label">STEPS</div>
            <div class="param-controls" style="display:flex; align-items:center; gap:3px;">
                <button id="stepsMinus" class="small-btn">-</button>
                <input type="number" id="stepsInput" value="16">
                <button id="stepsPlus" class="small-btn">+</button>
            </div>
        </div>
    </div>

    <div class="tilt-wrapper">
        <input type="checkbox" id="tiltToggle">
        <label for="tiltToggle">Tilt Control (Auto-Center)</label>
    </div>

    <div class="xy-wrapper">
        <span class="label top" id="label-hate">Hate</span>
        <span class="label bottom" id="label-void">Void</span>
        <span class="label left" id="label-doom">Doom</span>
        <span class="label right" id="label-blast">Blast</span>
        <div class="xy-pad" id="xyPad">
            <div class="puck" id="puck"></div>
        </div>
    </div>

    <div class="sequencer" id="sequencer"></div>

    <button id="downloadMidiBtn" class="download-btn">DOWNLOAD MIDI</button>

    <script>
        let isPlaying = false, bpm = 140, totalSteps = 16, complexity = 0.5, loudness = 0.5;
        let tiltEnabled = false, needsCalibration = false, baseGamma = 0, baseBeta = 0;
        const tiltSensitivity = 2.5;
        let currentStep = 0, nextNoteTime = 0, timerID, audioCtx;
        const instruments = ['Cymbal', 'Snare', 'Kick'];
        let groove = { 'Cymbal': [], 'Snare': [], 'Kick': [] };

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(inst, velocity, time) {
            if (!audioCtx) return;
            const vol = (velocity / 127) * (0.4 + (loudness * 0.6));
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(vol, time);
            gainNode.connect(audioCtx.destination);

            if (inst === 'Kick') {
                const osc = audioCtx.createOscillator();
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gainNode); osc.start(time); osc.stop(time + 0.2);
            } else if (inst === 'Snare') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = 1000;
                noise.connect(filter); filter.connect(gainNode);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                noise.start(time);
            } else if (inst === 'Cymbal') {
                const isCrash = loudness >= 0.75;
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * (isCrash ? 1.5 : 0.5), audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = isCrash ? 4000 : 6000;
                noise.connect(filter); filter.connect(gainNode);
                let decay = isCrash ? 1.5 : (velocity < 85 ? 0.08 : 0.4);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + decay);
                noise.start(time);
            }
        }

        function updateLabels() {
            const labels = { 'hate': loudness, 'void': 1 - loudness, 'doom': 1 - complexity, 'blast': complexity };
            for (let id in labels) {
                const val = Math.pow(labels[id], 2.5);
                const el = document.getElementById('label-' + id);
                const r = Math.floor(68 + (val * (229 - 68)));
                const g = Math.floor(68 + (val * (57 - 68)));
                const b = Math.floor(68 + (val * (53 - 68)));
                el.style.color = `rgb(${r}, ${g}, ${b})`;
                if (val > 0.4) el.style.textShadow = `0 0 ${val * 15}px var(--accent)`;
                else el.style.textShadow = 'none';
            }
        }

        function generateGroove() {
            for(let inst in groove) groove[inst] = new Array(totalSteps).fill(0);
            let currentSeed = Math.floor(complexity * 25) + (Math.floor(loudness * 25) * 100);
            const rnd = () => { let x = Math.sin(currentSeed++) * 10000; return x - Math.floor(x); };

            // SZIGORÍTOTT ZÓNA HATÁROK
            let isDoom = complexity < 0.15, isBlast = complexity >= 0.92;
            let isCornerHate = loudness > 0.88; // Csak a pad legtetején vált extrémbe
            let isHeavyBreakdown = (isDoom && isCornerHate); 
            let isDeathcoreWall = (isBlast && isCornerHate);

            for(let i = 0; i < totalSteps; i++) {
                let mI = i % 16, isK = false, isS = false, cV = 0;
                let dVel = loudness >= 0.5 ? 100 + (loudness - 0.5) * 54 : 80 + (loudness * 40);
                
                if (isHeavyBreakdown) {
                    if (mI === 8) isS = true; if (mI === 0) isK = true;
                    if (complexity >= 0.05 && mI === 2) isK = true;
                    if (complexity >= 0.10 && mI === 14) isK = true;
                } else if (isDeathcoreWall) {
                    isK = true; if (mI % 2 === 0) isS = true;
                } else if (isDoom) {
                    if (mI === 8) isS = true; if (mI === 0) isK = true;
                } else if (complexity < 0.6) {
                    if (mI === 4 || mI === 12) isS = true; if (mI === 0 || mI === 8) isK = true;
                } else {
                    if (mI % 4 === 2) isS = true; if (mI % 4 === 0) isK = true;
                    if (complexity >= 0.68 && (mI === 3 || mI === 11)) isK = true;
                    if (complexity >= 0.80 && (mI === 7 || mI === 15)) isK = true;
                }

                // CINTÁNYÉR: Csak a sarokban ürül ki a breakdownhoz
                if (isHeavyBreakdown || isDeathcoreWall) { 
                    if (mI % 8 === 0) cV = 120; // Ritkább crash a breakdownhoz
                } else if (loudness >= 0.75) {
                    if (mI % 4 === 0) cV = 115; // 4 cines "kalapálás" a Hate zóna nagy részén
                } else if (loudness < 0.25) {
                    if (isDoom) cV = (mI % 4 === 0) ? 90 : (mI % 2 === 0 ? 50 : 0);
                } else {
                    if (mI % 4 === 0) cV = 110;
                    else if (rnd() < (isDoom ? 0.3 : 0.6)) cV = 40;
                }

                groove['Kick'][i] = isK ? dVel : 0; groove['Snare'][i] = isS ? dVel : 0; groove['Cymbal'][i] = cV;
            }
            updateSequencerVisuals(); updateLabels();
        }

        const seqDiv = document.getElementById('sequencer');
        function initSequencer() {
            seqDiv.innerHTML = '';
            instruments.forEach(inst => {
                const row = document.createElement('div'); row.className = 'row';
                const label = document.createElement('div'); label.className = 'row-label';
                label.innerText = inst === 'Cymbal' ? 'CY' : (inst === 'Snare' ? 'SN' : 'KD');
                row.appendChild(label);
                const stepsDiv = document.createElement('div'); stepsDiv.className = 'steps';
                for(let i=0; i<totalSteps; i++) {
                    const step = document.createElement('div'); step.className = 'step'; step.id = `step-${inst}-${i}`;
                    stepsDiv.appendChild(step);
                }
                row.appendChild(stepsDiv); seqDiv.appendChild(row);
            });
            generateGroove();
        }

        function updateSequencerVisuals() {
            instruments.forEach(inst => {
                for(let i=0; i<totalSteps; i++) {
                    const step = document.getElementById(`step-${inst}-${i}`);
                    if (step) step.classList.toggle('active', groove[inst][i] > 0);
                }
            });
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                let s = currentStep;
                setTimeout(() => { if (isPlaying) {
                    document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
                    instruments.forEach(inst => {
                        const el = document.getElementById(`step-${inst}-${s}`);
                        if(el) el.classList.add('playing');
                    });
                }}, (nextNoteTime - audioCtx.currentTime) * 1000);
                instruments.forEach(inst => { if (groove[inst][currentStep] > 0) playSound(inst, groove[inst][currentStep], nextNoteTime); });
                nextNoteTime += 0.25 * (60.0 / bpm);
                currentStep = (currentStep + 1) % totalSteps;
            }
            timerID = setTimeout(scheduler, 25);
        }

        document.getElementById('playBtn').onclick = function() {
            initAudio();
            if (isPlaying) { isPlaying = false; this.innerText = "PLAY"; clearTimeout(timerID); }
            else { isPlaying = true; this.innerText = "STOP"; currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.05; scheduler(); }
        };

        function updateSteps(val) { totalSteps = Math.max(2, Math.min(32, val)); document.getElementById('stepsInput').value = totalSteps; initSequencer(); }
        document.getElementById('stepsMinus').onclick = () => updateSteps(totalSteps - 1);
        document.getElementById('stepsPlus').onclick = () => updateSteps(totalSteps + 1);
        document.getElementById('bpmInput').onchange = (e) => bpm = e.target.value;
        document.getElementById('bpmMinus').onclick = () => { bpm--; document.getElementById('bpmInput').value = bpm; };
        document.getElementById('bpmPlus').onclick = () => { bpm++; document.getElementById('bpmInput').value = bpm; };

        function updateXY(x, y) {
            const rect = document.getElementById('xyPad').getBoundingClientRect();
            complexity = Math.max(0, Math.min(1, x / rect.width));
            loudness = Math.max(0, Math.min(1, 1 - (y / rect.height)));
            document.getElementById('puck').style.left = (complexity * 100) + '%';
            document.getElementById('puck').style.top = ((1 - loudness) * 100) + '%';
            generateGroove();
        }

        document.getElementById('xyPad').onpointerdown = (e) => updateXY(e.offsetX, e.offsetY);
        document.getElementById('xyPad').onpointermove = (e) => { if (e.buttons === 1) updateXY(e.offsetX, e.offsetY); };

        document.getElementById('tiltToggle').onchange = (e) => { tiltEnabled = e.target.checked; needsCalibration = true; };
        window.addEventListener('deviceorientation', (e) => {
            if (!tiltEnabled) return;
            if (needsCalibration) { baseGamma = e.gamma; baseBeta = e.beta; needsCalibration = false; }
            let x = 0.5 + (((e.gamma - baseGamma) * tiltSensitivity) / 90);
            let y = 0.5 - (((e.beta - baseBeta) * tiltSensitivity) / 90);
            const rect = document.getElementById('xyPad').getBoundingClientRect();
            updateXY(Math.max(0, Math.min(1, x)) * rect.width, Math.max(0, Math.min(1, y)) * rect.height);
        });

        initSequencer();
    </script>
</body>
</html>
